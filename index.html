    // ========== Toast Context ==========
    const ToastContext = createContext(null);
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const addToast = (message, type = 'success') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 5000);
      };
      return (
        <ToastContext.Provider value={{ addToast }}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type === 'error' ? 'toast-error' : 'toast-success'}`}>{t.message}</div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
    function useToast() { return useContext(ToastContext); }

    // ========== Auth Context ==========
    const AuthContext = createContext(null);
    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);
      const toast = useToast();

      const fetchProfile = useCallback(async (authUser) => {
        if (!authUser) return null;
        const { data: profData, error: profErr } = await supabase.from('profiles').select('*').eq('id', authUser.id).maybeSingle();
        if (profErr || !profData) { setProfile(null); throw new Error("प्रोफ़ाइल नहीं मिली"); }
        if (profData.section_id) {
          const { data: secData } = await supabase.from('sections').select('section_name').eq('id', profData.section_id).maybeSingle();
          profData.section_name = secData?.section_name || `Section ${profData.section_id}`;
        } else { profData.section_name = "सभी अनुभाग"; }
        setProfile(profData);
        return profData;
      }, []);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session?.user) { setUser(session.user); fetchProfile(session.user).catch(() => {}).finally(() => setLoading(false)); }
          else setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          if (session?.user) { setUser(session.user); fetchProfile(session.user).catch(() => {}); }
          else { setUser(null); setProfile(null); }
        });
        return () => subscription.unsubscribe();
      }, [fetchProfile]);

      const signIn = async (email, password) => {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await fetchProfile(data.user);
        if (typeof toast === 'function') toast?.("लॉगिन सफल!", "success");
      };
      const signOut = () => { supabase.auth.signOut(); if (typeof toast === 'function') toast?.("लॉगआउट", "success"); };
      return <AuthContext.Provider value={{ user, profile, loading, signIn, signOut, supabase }}>{children}</AuthContext.Provider>;
    }
    function useAuth() { return useContext(AuthContext); }

    // ========== Data Hook ==========
    function useReports() {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);
      const { user, profile } = useAuth();
      const toast = useToast();

      const fetchReports = useCallback(async () => {
        if (!user || !profile) return;
        let query = supabase.from('reports').select('*').order('created_at', { ascending: false });
        if (profile.role !== 'HINDI_CELL') {
          query = query.eq('section_name', profile.section_name);
        }
        const { data, error } = await query;
        if (error) { if (typeof toast === 'function') toast?.(error.message, 'error'); setLoading(false); return; }
        setReports(data || []);
        setLoading(false);
      }, [user, profile]);

      useEffect(() => {
        fetchReports();
        const channel = supabase.channel('db-reports-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => { fetchReports(); }).subscribe();
        return () => supabase.removeChannel(channel);
      }, [fetchReports]);

      return { reports, loading, refetch: fetchReports };
    }

    // ========== Login Screen ==========
    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { signIn } = useAuth();

      const handleLogin = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true);
        try { await signIn(email, password); }
        catch (err) { setError("ईमेल या पासवर्ड गलत है।"); }
        finally { setLoading(false); }
      };

      return (
        <div style={{ minHeight: '100vh', background: '#312e81', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center' }}>
          <div style={{ background: '#fff', borderRadius: '32px', padding: '40px 32px', maxWidth: 450, width: '90%', boxShadow: '0 20px 60px rgba(0,0,0,0.3)' }}>
            <div style={{ textAlign: 'center', marginBottom: '30px' }}>
              <div style={{ fontSize: '48px', marginBottom: '10px' }}>🏛️</div>
              <h1 style={{ fontSize: '20px', fontWeight: 800, color: '#1e293b', margin: '0 0 6px 0' }}>प्रधान निदेशक लेखापरीक्षा का कार्यालय, रेलवे, मुंबई</h1>
              <p style={{ fontSize: '15px', color: '#4f46e5', fontWeight: 700 }}>राजभाषा पोर्टल</p>
              <p style={{ fontSize: '13px', color: '#64748b', marginTop: '6px' }}>अपने क्रेडेंशियल्स दर्ज करें</p>
            </div>
            <form onSubmit={handleLogin}>
              <Inp label="ईमेल आईडी" type="email" value={email} onChange={setEmail} />
              <div style={{ marginTop: '16px' }}><Inp label="पासवर्ड" type="password" value={password} onChange={setPassword} /></div>
              {error && <div style={{ color: '#dc2626', background: '#fee2e2', padding: '10px', borderRadius: '8px', marginTop: '16px', fontSize: '13px', fontWeight: 600 }}>{error}</div>}
              <button type="submit" disabled={loading} style={{ width: '100%', padding: '16px', borderRadius: '12px', border: 'none', background: '#6366f1', color: '#fff', fontWeight: 800, fontSize: '16px', marginTop: '24px', cursor: loading ? 'not-allowed' : 'pointer', boxShadow: '0 4px 12px rgba(99,102,241,0.3)' }}>
                {loading ? 'सत्यापन हो रहा है...' : 'लॉगिन करें →'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ========== Report Form ==========
    function ReportForm({ user, reports, initialData, onSave, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [submitting, setSubmitting] = useState(false);
      const [validationWarnings, setValidationWarnings] = useState([]);
      const set = (k, v) => setData(d => ({ ...d, [k]: v }));

      const isQ4 = data.quarter === "Q4";
      const showPart2 = isQ4 && user.role === 'HINDI_CELL';

      const validate = () => {
        const warnings = [];
        if (!data.officeNameAddress) warnings.push("कृपया कार्यालय का पता भरें।");
        if (!data.officerPhone) warnings.push("कृपया फोन नंबर भरें।");
        if (!data.officerEmail) warnings.push("कृपया ईमेल भरें।");
        const totalIssued = parseInt(data.b1_s3_total_issued) || 0;
        const sum = (parseInt(data.b1_s3_bilingual)||0) + (parseInt(data.b1_s3_english_only)||0) + (parseInt(data.b1_s3_hindi_only)||0);
        if (totalIssued !== 0 && sum !== totalIssued) {
          warnings.push(`धारा 3(3) कुल जारी (${totalIssued}) द्विभाषी+अंग्रेजी+हिंदी (${sum}) से मेल नहीं खाता।`);
        }
        return warnings;
      };

      const handleSubmit = async () => {
        const warnings = validate();
        if (warnings.length > 0) {
          setValidationWarnings(warnings);
          if (!window.confirm("कुछ वैलिडेशन चेतावनियाँ हैं:\n" + warnings.join('\n') + "\n\nक्या आप फिर भी रिपोर्ट जमा करना चाहते हैं?")) {
            return;
          }
        }
        setSubmitting(true);
        try {
          const report = { ...data, section_name: data.section_name || user.section_name };
          if (initialData && user.role === 'DEO' && (initialData.status === 'AAO_RETURNED' || initialData.status === 'SAO_RETURNED')) {
            report.status = 'PENDING_AAO';
            const timeline = report.timeline || [];
            timeline.push({
              ts: new Date().toISOString(),
              role: user.role,
              name: user.section_name,
              action: "DEO ने वापसी के बाद रिपोर्ट सुधार कर पुनः भेजी",
              remark: ""
            });
            report.timeline = timeline;
          }
          if (initialData && user.role === 'HINDI_CELL') {
            const timeline = report.timeline || [];
            timeline.push({
              ts: new Date().toISOString(),
              role: user.role,
              name: user.section_name,
              action: "हिंदी प्रकोष्ठ द्वारा संपादित",
              remark: ""
            });
            report.timeline = timeline;
          }
          await onSave(report);
        } catch (err) {
          console.error("Report submission error:", err);
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <div style={{ maxWidth: 900, margin: "0 auto", paddingBottom: "40px" }}>
          {validationWarnings.length > 0 && (
            <div style={{ background: "#fef3c7", border: "1px solid #f59e0b", borderRadius: "8px", padding: "12px 16px", marginBottom: "16px" }}>
              <strong>⚠️ वैलिडेशन चेतावनियाँ:</strong>
              <ul style={{ margin: '8px 0 0 16px', padding: 0 }}>
                {validationWarnings.map((w, i) => <li key={i}>{w}</li>)}
              </ul>
            </div>
          )}
          <div style={{ background: "linear-gradient(135deg, #4f46e5, #6366f1)", color: "white", padding: "24px", borderRadius: "16px", marginBottom: "24px", textAlign: "center", boxShadow: "0 6px 20px rgba(99,102,241,0.3)" }}>
            <h2 style={{ fontSize: "20px", fontWeight: 800, margin: "0 0 6px 0" }}>🏢 {data.section_name || user.section_name}</h2>
            <p style={{ fontSize: "14px", opacity: 0.9, margin: 0, fontWeight: 600 }}>राजभाषा हिंदी के प्रगामी प्रयोग से संबंधित तिमाही प्रगति रिपोर्ट</p>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>

                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#475569", marginBottom: '4px', display: 'block' }}>वर्ष</label>
                  <select value={data.year} onChange={e => set("year", e.target.value)} style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #cbd5e1", fontSize: 15, fontFamily: "inherit", outline: "none" }}>
                    {YEARS.map(y => <option key={y}>{y}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#475569", marginBottom: '4px', display: 'block' }}>तिमाही</label>
                  <select value={data.quarter} onChange={e => set("quarter", e.target.value)} style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #cbd5e1", fontSize: 15, fontFamily: "inherit", outline: "none" }}>

              <Grid>

    // ========== Hindi Cell Dashboard (Status & Consolidation) ==========
    function HindiCellDashboard({ reports, sections, onSelectSections, selectedSections, onConsolidate }) {
      const [selectAll, setSelectAll] = useState(false);
      const getCurrentQuarterYear = () => {
        if (reports.length === 0) return { quarter: "Q4", year: "2026" };
        const sorted = [...reports].sort((a,b) => {
          if (a.year !== b.year) return b.year - a.year;
          const qOrder = { Q1:1, Q2:2, Q3:3, Q4:4 };
          return qOrder[b.quarter] - qOrder[a.quarter];
        });
        return { quarter: sorted[0].quarter, year: sorted[0].year };
      };

      const { quarter: currentQuarter, year: currentYear } = getCurrentQuarterYear();

      const handleToggleAll = () => {
        const allIds = sections.map(s => s.id);
        if (selectAll) {
          onSelectSections([]);
        } else {
          onSelectSections(allIds);
        }
        setSelectAll(!selectAll);
      };

      const handleToggle = (id) => {
        if (selectedSections.includes(id)) {
          onSelectSections(selectedSections.filter(s => s !== id));
        } else {
          onSelectSections([...selectedSections, id]);
        }
      };

      const getLatestReport = (sectionName) => {
        const sectionReports = reports.filter(r => r.section_name === sectionName && r.quarter === currentQuarter && r.year === currentYear);
        if (sectionReports.length === 0) return null;
        const sorted = sectionReports.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
        return sorted[0];
      };

      return (
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
            <h2 style={{ fontSize: "22px", fontWeight: 800, color: "#1e293b", margin: 0 }}>
              📊 सभी अनुभागों की रिपोर्ट स्थिति ({currentQuarter} {currentYear})
            </h2>
            <div style={{ display: "flex", gap: "12px" }}>
              <button onClick={handleToggleAll} style={{ padding: "8px 16px", borderRadius: "8px", border: "1px solid #cbd5e1", background: "#fff", fontWeight: 700, cursor: "pointer", fontSize: "13px" }}>
                {selectAll ? "सभी अचयनित करें" : "सभी चुनें"}
              </button>
              <button onClick={onConsolidate} disabled={selectedSections.length === 0} style={{ padding: "10px 20px", borderRadius: "8px", border: "none", background: selectedSections.length === 0 ? "#94a3b8" : "#6366f1", color: "#fff", fontWeight: 700, cursor: selectedSections.length === 0 ? "not-allowed" : "pointer", fontSize: "14px" }}>
                📄 समेकित रिपोर्ट बनाएँ ({selectedSections.length})
              </button>
            </div>
          </div>
          <div style={{ overflowX: "auto", background: "#fff", borderRadius: "12px", border: "1px solid #e2e8f0" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
              <thead style={{ background: "#f8fafc" }}>
                <tr>
                  <th style={{ padding: "12px 16px", textAlign: "left", borderBottom: "1px solid #e2e8f0" }}>चुनें</th>
                  <th style={{ padding: "12px 16px", textAlign: "left", borderBottom: "1px solid #e2e8f0" }}>अनुभाग</th>
                  <th style={{ padding: "12px 16px", textAlign: "left", borderBottom: "1px solid #e2e8f0" }}>रिपोर्ट स्थिति</th>
                  <th style={{ padding: "12px 16px", textAlign: "left", borderBottom: "1px solid #e2e8f0" }}>अंतिम अपडेट</th>
                  <th style={{ padding: "12px 16px", textAlign: "left", borderBottom: "1px solid #e2e8f0" }}>रिपोर्ट ID</th>
                </tr>
              </thead>
              <tbody>
                {sections.map(sec => {
                  const latest = getLatestReport(sec.section_name);
                  const status = latest ? STATUS[latest.status] : null;
                  const isSelected = selectedSections.includes(sec.id);
                  return (
                    <tr key={sec.id} style={{ borderBottom: "1px solid #e2e8f0" }}>
                      <td style={{ padding: "12px 16px" }}>
                        <input type="checkbox" checked={isSelected} onChange={() => handleToggle(sec.id)} disabled={!latest} style={{ width: 18, height: 18 }} />
                      </td>
                      <td style={{ padding: "12px 16px", fontWeight: 600 }}>{sec.section_name}</td>
                      <td style={{ padding: "12px 16px" }}>
                        {status ? (
                          <span style={{ background: status.bg, color: status.color, padding: "4px 12px", borderRadius: "6px", fontWeight: 600, fontSize: "12px" }}>{status.icon} {status.label}</span>
                        ) : <span style={{ color: "#94a3b8" }}>रिपोर्ट नहीं</span>}
                      </td>
                      <td style={{ padding: "12px 16px", color: "#64748b", fontSize: "13px" }}>{latest ? new Date(latest.updated_at).toLocaleDateString('hi-IN') : '-'}</td>
                      <td style={{ padding: "12px 16px", fontFamily: "monospace", fontSize: "12px" }}>{latest ? latest.ackId : '-'}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    // ========== Consolidated Report ==========
    function ConsolidatedReport({ reports, selectedSections, sections, onBack }) {
      const [consolidatedData, setConsolidatedData] = useState(null);
      const getCurrentQuarterYear = () => {
        if (reports.length === 0) return { quarter: "Q4", year: "2026" };
        const sorted = [...reports].sort((a,b) => {
          if (a.year !== b.year) return b.year - a.year;
          const qOrder = { Q1:1, Q2:2, Q3:3, Q4:4 };
          return qOrder[b.quarter] - qOrder[a.quarter];
        });
        return { quarter: sorted[0].quarter, year: sorted[0].year };
      };

      const { quarter: currentQuarter, year: currentYear } = getCurrentQuarterYear();

      useEffect(() => {
        const selectedReports = sections
          .filter(s => selectedSections.includes(s.id))
          .map(s => {
            const sectionReports = reports.filter(r => r.section_name === s.section_name && r.quarter === currentQuarter && r.year === currentYear);
            if (sectionReports.length === 0) return null;
            return sectionReports.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
          })
          .filter(r => r !== null);

        if (selectedReports.length === 0) {
          setConsolidatedData(null);
          return;
        }

        const sumFields = (fields) => {
          const result = {};
          fields.forEach(f => {
            result[f] = selectedReports.reduce((acc, r) => acc + (parseInt(r[f]) || 0), 0);
          });
          return result;
        };

        const numericFields = [
          'b1_s1_total_files', 'b1_s1_hindi_files',
          'b1_s2_total_meetings', 'b1_s2_hindi_minutes', 'b1_s2_total_docs', 'b1_s2_hindi_docs',
          'b1_s3_total_issued', 'b1_s3_bilingual', 'b1_s3_english_only', 'b1_s3_hindi_only',
          'b1_s4_total_received', 'b1_s4_no_reply_needed', 'b1_s4_hindi_reply', 'b1_s4_english_reply',
          'b1_s5_ka_total', 'b1_s5_ka_hindi_reply', 'b1_s5_ka_eng_reply', 'b1_s5_ka_no_reply',
          'b1_s5_kha_total', 'b1_s5_kha_hindi_reply', 'b1_s5_kha_eng_reply', 'b1_s5_kha_no_reply',
          'b1_s6_ka_total', 'b1_s6_ka_hindi', 'b1_s6_ka_english',
          'b1_s6_kha_total', 'b1_s6_kha_hindi', 'b1_s6_kha_english',
          'b1_s6_ga_total', 'b1_s6_ga_hindi', 'b1_s6_ga_english',
          'b1_s7_hindi_pages', 'b1_s7_eng_pages', 'b1_s7_total_pages', 'b1_s7_eoffice',
          'b1_s8_workshops', 'b1_s8_staff', 'b1_s8_officers',
          'b1_s9_sub_office_cmtes', 'b1_s9_sub_office_meetings',
        ];
        const sums = sumFields(numericFields);

        setConsolidatedData({
          sections: selectedReports.map(r => r.section_name),
          sums,
          totalReports: selectedReports.length,
          quarter: currentQuarter,
          year: currentYear
        });

    // ========== Action Dashboard (Inbox) ==========
    function ActionDashboard({ reports, user, onEdit, setView, onPrint }) {
      const [selected, setSelected] = useState(null);
      const [remark, setRemark] = useState("");
      const [showCertModal, setShowCertModal] = useState(false);
      const [pendingAction, setPendingAction] = useState(null);
      const toast = useToast();

      const myReports = reports.filter(rep => {
        if (user.role === 'DEO') return rep.section_name === user.section_name;
        if (user.role === 'AAO') return rep.section_name === user.section_name && ['PENDING_AAO', 'SAO_RETURNED', 'AAO_APPROVED'].includes(rep.status);
        if (user.role === 'SAO') return rep.section_name === user.section_name && ['PENDING_SAO', 'AAO_RETURNED', 'SAO_APPROVED'].includes(rep.status);
        if (user.role === 'HINDI_CELL') return ['SAO_APPROVED', 'SUBMITTED'].includes(rep.status);
        return true;
      });

      const handleStatusChange = async (reportId, nextAction, certData = null) => {
        try {
          const updateData = { status: nextAction, updated_at: new Date().toISOString() };
          if (certData) {
            updateData.b1_cert_name = certData.b1_cert_name;
            updateData.b1_cert_desig = certData.b1_cert_desig;
            updateData.b1_cert_phone = certData.b1_cert_phone;
            updateData.b1_cert_date = certData.b1_cert_date;
            updateData.b1_cert_place = certData.b1_cert_place;
            updateData.b1_cert_agreed = certData.b1_cert_agreed;
          }
          const { data: existing } = await supabase.from('reports').select('timeline').eq('id', reportId).single();
          const timeline = existing?.timeline || [];
          timeline.push({
            ts: new Date().toISOString(),
            role: user.role,
            name: user.section_name,
            action: `स्थिति बदली: ${nextAction}`,
            remark: remark || ""
          });
          updateData.timeline = timeline;

          const { error } = await supabase.from('reports').update(updateData).eq('id', reportId);
          if (error) throw error;
          if (typeof toast === 'function') toast("स्थिति अपडेट की गई", "success");
          setSelected(null);
          setShowCertModal(false);
          setPendingAction(null);
          setRemark("");
        } catch (err) {
          console.error("Status change error:", err);
          if (typeof toast === 'function') toast(err.message, "error");
          else alert("त्रुटि: " + err.message);
        }
      };

      const handleActionClick = (report, action) => {
        if (user.role === 'SAO' && action === 'SAO_APPROVED') {
          setPendingAction({ report, action });
          setShowCertModal(true);
        } else {
          handleStatusChange(report.id, action);
        }
      };

      const handleCertConfirm = (certData) => {
        if (pendingAction) {
          handleStatusChange(pendingAction.report.id, pendingAction.action, certData);
        }
      };

      const renderTimeline = (timeline) => {
        if (!timeline || timeline.length === 0) return <p>कोई ऑडिट ट्रेल उपलब्ध नहीं है।</p>;
        return (
          <div className="audit-timeline">
            {timeline.map((entry, idx) => (
              <div key={idx} className="entry">
                <div className="time">{new Date(entry.ts).toLocaleString('hi-IN')}</div>
                <div className="action">{entry.action}</div>
                <div style={{ fontSize: '12px', color: '#475569' }}>द्वारा: {entry.role} – {entry.name}</div>
                {entry.remark && <div style={{ fontSize: '12px', color: '#64748b' }}>टिप्पणी: {entry.remark}</div>}
              </div>
            ))}
          </div>
        );
      };

      if (selected) {
        const st = STATUS[selected.status] || { label: selected.status, bg: "#eee", color: "#333", icon: "📌" };
        const actionBtns = (() => {
          if (user.role === 'DEO' && (selected.status === 'AAO_RETURNED' || selected.status === 'SAO_RETURNED')) {
            return [{ label: "✏️ संपादित करें", action: "EDIT", grad: "linear-gradient(135deg,#f59e0b,#f97316)" }];
          }
          const map = {
            AAO: {
              PENDING_AAO: [
                { label: "✅ SAO को अग्रेषित करें", action: "PENDING_SAO", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" },
                { label: "↩️ अनुभाग (DEO) को वापस करें", action: "AAO_RETURNED", grad: "linear-gradient(135deg,#f97316,#ef4444)" }
              ],
              SAO_RETURNED: [
                { label: "✅ SAO को पुनः भेजें", action: "PENDING_SAO", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" },
                { label: "↩️ अनुभाग (DEO) को वापस करें", action: "AAO_RETURNED", grad: "linear-gradient(135deg,#f97316,#ef4444)" }
              ],
            },
            SAO: {
              PENDING_SAO: [
                { label: "✅ हिंदी प्रकोष्ठ को भेजें", action: "SAO_APPROVED", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" },
                { label: "↩️ AAO को वापस करें", action: "SAO_RETURNED", grad: "linear-gradient(135deg,#f97316,#ef4444)" }
              ],
            },
            HINDI_CELL: {
              SAO_APPROVED: [
                { label: "🎉 अंतिम स्वीकृति दें", action: "SUBMITTED", grad: "linear-gradient(135deg,#f59e0b,#10b981)" },
                { label: "↩️ SAO को वापस करें", action: "SAO_RETURNED", grad: "linear-gradient(135deg,#dc2626,#9f1239)" }
              ],
            },
          };
          return map[user.role]?.[selected.status] || [];
        })();

        return (
          <div style={{ maxWidth: 800, margin: "0 auto" }}>
            <button onClick={() => setSelected(null)} className="no-print" style={{ background: "none", border: "none", color: "#6366f1", fontWeight: 700, cursor: "pointer", marginBottom: "16px", fontSize: "15px", display: 'flex', alignItems: 'center', gap: '5px', padding: 0 }}>← वापस सूची में</button>
            <div style={{ background: "#fff", borderRadius: "16px", padding: "24px", border: "1px solid #e2e8f0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "20px", borderBottom: "1px solid #e2e8f0", paddingBottom: "16px" }}>
                <div>
                  <h2 style={{ fontSize: "22px", fontWeight: 800, color: "#1e293b", margin: "0 0 6px 0" }}>{selected.section_name}</h2>
                  <span style={{ fontSize: "14px", color: "#64748b", fontWeight: 600 }}>{selected.quarter} · {selected.year} · ID: {selected.ackId}</span>
                </div>
                <span style={{ background: st.bg, color: st.color, padding: "8px 14px", borderRadius: "8px", fontWeight: 700, fontSize: "13px", border: `1px solid ${st.color}40`, display: 'flex', alignItems: 'center', gap: '6px' }}>{st.icon} {st.label}</span>
              </div>

              {/* Report Data Preview */}
              <ReportDataView report={selected} />

              {actionBtns.length > 0 ? (
                <div className="no-print" style={{ background: "#f8fafc", padding: "20px", borderRadius: "12px", border: "1px solid #cbd5e1", marginTop: '16px' }}>
                  <h3 style={{ fontSize: "15px", fontWeight: 800, color: "#1e293b", margin: "0 0 12px 0" }}>⚡ कार्रवाई करें</h3>
                  <textarea value={remark} onChange={e => setRemark(e.target.value)} placeholder="यहां कोई टिप्पणी लिखें (वैकल्पिक)..." style={{ width: "100%", padding: "12px", borderRadius: "8px", border: "1px solid #cbd5e1", marginBottom: "16px", outline: "none", fontFamily: "inherit", fontSize: "14px" }} rows={2} />
                  <div style={{ display: "flex", gap: "12px", flexWrap: "wrap" }}>
                    {actionBtns.map(btn => (
                      <button key={btn.action} onClick={() => {
                        if (btn.action === 'EDIT') {
                          onEdit(selected);
                        } else {
                          handleActionClick(selected, btn.action);
                        }
                      }} style={{ flex: 1, padding: "14px", borderRadius: "10px", border: "none", background: btn.grad, color: "#fff", fontWeight: 800, cursor: "pointer", fontSize: "15px" }}>{btn.label}</button>
                    ))}
                  </div>
                </div>
              ) : (
                <div className="no-print" style={{ background: "#f1f5f9", padding: "16px", borderRadius: "10px", color: "#64748b", fontWeight: 600, textAlign: "center", marginTop: '16px', fontSize: "14px" }}>वर्तमान स्थिति में आपके लिए कोई कार्रवाई लंबित नहीं है।</div>
              )}
              <div className="no-print" style={{ marginTop: '16px', display: 'flex', justifyContent: 'flex-end' }}>
                <button onClick={() => onPrint(selected)} style={{ padding: "10px 20px", borderRadius: "8px", border: "none", background: "#0ea5e9", color: "#fff", fontWeight: 700, cursor: "pointer" }}>🖨️ PDF प्रिंट करें</button>
              </div>
              <div style={{ marginTop: '20px', borderTop: '1px solid #e2e8f0', paddingTop: '20px' }}>
                <h3 style={{ fontSize: '16px', fontWeight: 800, color: '#1e293b', marginBottom: '12px' }}>📜 ऑडिट ट्रेल</h3>
                {renderTimeline(selected.timeline)}
              </div>
            </div>
            {showCertModal && (
              <CertificateModal report={selected} onConfirm={handleCertConfirm} onCancel={() => { setShowCertModal(false); setPendingAction(null); }} />
            )}
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
            <h2 style={{ fontSize: "20px", fontWeight: 800, color: "#1e293b", margin: 0 }}>{user.role === 'DEO' ? '📋 मेरी फाइलें' : '📥 इनबॉक्स'}</h2>
            {user.role === 'DEO' && (
              <button onClick={() => setView('form')} style={{ background: "#6366f1", color: "#fff", border: "none", padding: "10px 18px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>+ नई रिपोर्ट</button>
            )}
          </div>
          {myReports.length === 0 ? (
            <div style={{ background: "#fff", padding: "40px", borderRadius: "16px", textAlign: "center", border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: "48px", marginBottom: "16px" }}>📭</div>
              <p style={{ color: "#64748b", fontWeight: 600, margin: 0, fontSize: "16px" }}>कोई रिपोर्ट नहीं मिली।</p>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              {myReports.map(rep => {
                const st = STATUS[rep.status] || { label: rep.status, bg: "#eee", color: "#333" };
                const needsAction = (() => {
                  if (user.role === 'DEO' && (rep.status === 'AAO_RETURNED' || rep.status === 'SAO_RETURNED')) return true;
                  const map = {
                    AAO: ['PENDING_AAO', 'SAO_RETURNED'],
                    SAO: ['PENDING_SAO', 'AAO_RETURNED'],
                    HINDI_CELL: ['SAO_APPROVED']
                  };
                  return map[user.role]?.includes(rep.status) || false;
                })();
                return (
                  <div key={rep.id} onClick={() => setSelected(rep)} style={{ background: "#fff", padding: "16px 20px", borderRadius: "12px", border: "1px solid #e2e8f0", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", boxShadow: "0 2px 5px rgba(0,0,0,0.02)" }}>
                    <div>
                      <div style={{ fontSize: "16px", fontWeight: 800, color: "#1e293b" }}>{rep.section_name}</div>
                      <div style={{ fontSize: "13px", color: "#64748b", marginTop: "4px", fontWeight: 600 }}>{rep.quarter} · {rep.year}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                      {needsAction && <span style={{ background: "#ef4444", color: "#fff", padding: "4px 10px", borderRadius: "6px", fontSize: "11px", fontWeight: 800 }}>कार्रवाई आवश्यक</span>}
                      <span style={{ background: st.bg, color: st.color, padding: "6px 12px", borderRadius: "8px", fontSize: "13px", fontWeight: 700, border: `1px solid ${st.color}30` }}>{st.label}</span>
                    </div>
                  </div>
                )
              })}
            </div>
          )}
        </div>
      );
    }

    // ========== Main App ==========
    function App() {
      return (
        <ToastProvider>
          <AuthProvider>
            <MainApp />
          </AuthProvider>
        </ToastProvider>
      );
    }

    function MainApp() {
      const { user, profile, signOut, loading } = useAuth();
      if (loading) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div className="spinner"></div></div>;
      if (!user || !profile) return <LoginScreen />;
      return <AuthenticatedApp user={user} profile={profile} signOut={signOut} />;
    }

    function AuthenticatedApp({ user, profile, signOut }) {
      const { reports, loading, refetch } = useReports();
      const [view, setView] = useState(profile.role === 'DEO' ? 'form' : 'inbox');
      const [editingReport, setEditingReport] = useState(null);
      const [sections, setSections] = useState([]);
      const [selectedSections, setSelectedSections] = useState([]);
      const [showConsolidated, setShowConsolidated] = useState(false);
      const [printReport, setPrintReport] = useState(null);
      const toast = useToast();

      useEffect(() => {
        if (profile.role === 'HINDI_CELL') {
          supabase.from('sections').select('*').then(({ data, error }) => {
            if (!error) setSections(data || []);
          });
        }
      }, [profile.role]);

      const handleSaveReport = async (reportData) => {
        console.log("Saving report data:", reportData); // Debug log
        try {
          // Duplicate check for DEO new reports
          if (!reportData.id && profile.role === 'DEO') {
            const { data: existing, error } = await supabase
              .from('reports')
              .select('id, status')
              .eq('section_name', reportData.section_name)
              .eq('quarter', reportData.quarter)
              .eq('year', reportData.year)
              .neq('status', 'AAO_RETURNED')
              .neq('status', 'SAO_RETURNED');
            if (error) throw error;
            if (existing && existing.length > 0) {
              const hasActive = existing.some(r => r.status !== 'AAO_RETURNED' && r.status !== 'SAO_RETURNED');
              if (hasActive) {
                throw new Error("आपकी रिपोर्ट पहले ही जमा हो चुकी है। धन्यवाद");
              }
            }
          }

          reportData.updated_at = new Date().toISOString();
          if (reportData.id) {
            const { error } = await supabase.from('reports').update(reportData).eq('id', reportData.id);
            if (error) throw error;
            if (typeof toast === 'function') toast("रिपोर्ट अपडेट की गई", "success");
          } else {
            reportData.status = 'PENDING_AAO';
            reportData.timeline = [{ ts: new Date().toISOString(), role: profile.role, name: profile.section_name, action: "रिपोर्ट बनाई गई", remark: "" }];
            const { error } = await supabase.from('reports').insert([reportData]);
            if (error) throw error;
            if (typeof toast === 'function') toast("रिपोर्ट सफलतापूर्वक जमा की गई", "success");
          }
          setTimeout(() => {
            setEditingReport(null);
            setView('inbox');
            refetch();
          }, 100);
        } catch (err) {
          console.error("Supabase error:", err);
          if (typeof toast === 'function') {
            toast(err.message || "डेटाबेस त्रुटि, कृपया पुनः प्रयास करें", "error");
          } else {
            alert("त्रुटि: " + (err.message || "अज्ञात त्रुटि"));
          }
        }
      };

      const handleEdit = (report) => {
        setEditingReport(report);
        setView('form');
      };

      const handleConsolidate = () => {
        setShowConsolidated(true);
      };

      const handleDeleteReport = async (id) => {
        try {
          const { error } = await supabase.from('reports').delete().eq('id', id);
          if (error) throw error;
          if (typeof toast === 'function') toast("रिपोर्ट हटा दी गई", "success");
          refetch();
        } catch (err) {
          console.error("Delete error:", err);
          if (typeof toast === 'function') toast(err.message || "हटाने में त्रुटि", "error");
        }
      };

      const handlePrint = (report) => {
        setPrintReport(report);
        setView('print');
      };

      const roleTheme = ROLES[profile.role] || { color: '#312e81', label: profile.role };

      if (profile.role === 'HINDI_CELL' && showConsolidated) {
        return (
          <ConsolidatedReport reports={reports} selectedSections={selectedSections} sections={sections} onBack={() => setShowConsolidated(false)} />
        );
      }

      const isHindiCell = profile.role === 'HINDI_CELL';

      if (view === 'print' && printReport) {
        return <ReportPrintView report={printReport} onClose={() => { setView('inbox'); setPrintReport(null); }} />;
      }

      return (
        <div>
          <nav style={{ background: roleTheme.color, padding: "14px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 4px 12px rgba(0,0,0,0.1)" }}>
            <div style={{ color: "white", fontWeight: 800, fontSize: "16px", display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span>🏛️</span> प्रधान निदेशक लेखापरीक्षा, रेलवे, मुंबई
            </div>
            <div style={{ display: "flex", gap: "10px" }}>
              <button onClick={() => setView('inbox')} style={{ background: view === 'inbox' ? "rgba(255,255,255,0.2)" : "transparent", color: "white", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>📥 डैशबोर्ड</button>
              {profile.role === 'DEO' && (
                <button onClick={() => setView('form')} style={{ background: view === 'form' ? "rgba(255,255,255,0.2)" : "transparent", color: "white", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>📝 नई रिपोर्ट</button>
              )}
              {isHindiCell && (
                <>
                  <button onClick={() => setView('dashboard')} style={{ background: view === 'dashboard' ? "rgba(255,255,255,0.2)" : "transparent", color: "white", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>📊 स्थिति</button>
                  <button onClick={() => setView('allReports')} style={{ background: view === 'allReports' ? "rgba(255,255,255,0.2)" : "transparent", color: "white", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>📋 सभी रिपोर्टें</button>
                </>
              )}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
              <span style={{ color: "white", fontSize: "13px", fontWeight: 700, background: "rgba(0,0,0,0.2)", padding: "6px 14px", borderRadius: "20px" }}>{roleTheme.label}</span>
              <button onClick={signOut} style={{ background: "#ef4444", color: "white", border: "none", padding: "8px 14px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "13px" }}>लॉगआउट</button>
            </div>
          </nav>

          <main style={{ padding: "30px 20px 80px" }}>
            {view === 'form' && (
              <ReportForm user={profile} reports={reports} initialData={editingReport} onSave={handleSaveReport} onCancel={() => { setView('inbox'); setEditingReport(null); }} />
            )}
            {view === 'inbox' && (
              <ActionDashboard reports={reports} user={profile} onEdit={handleEdit} setView={setView} onPrint={handlePrint} />
            )}
            {view === 'dashboard' && isHindiCell && (
              <HindiCellDashboard
                reports={reports}
                sections={sections}
                selectedSections={selectedSections}
                onSelectSections={setSelectedSections}
                onConsolidate={handleConsolidate}
              />
            )}
            {view === 'allReports' && isHindiCell && (
              <HindiCellReportsList
                reports={reports}
                sections={sections}
                onEdit={handleEdit}
                onDelete={handleDeleteReport}
              />
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
