    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      const fetchProfile = useCallback(async (userId) => {
        const { data, error } = await supabase
          .from('profiles')
          .select('*')
          .eq('id', userId)
          .single();
        if (!error && data) {
          setProfile(data);
        }
        return data;
      }, []);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            setUser(session.user);
            fetchProfile(session.user.id);
          }
          setLoading(false);
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange(
          async (event, session) => {
            if (session) {
              setUser(session.user);
              await fetchProfile(session.user.id);
            } else {
              setUser(null);
              setProfile(null);
            }
            setLoading(false);
          }
        );

        return () => subscription.unsubscribe();
      }, [fetchProfile]);

      const signIn = async (email, password) => {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        return data;
      };

      const signOut = async () => {
        await supabase.auth.signOut();
        setUser(null);
        setProfile(null);
      };

      return (
        <AuthContext.Provider value={{ user, profile, loading, signIn, signOut, supabase }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }

    // ============================================================

    function useReports() {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);
      const { user, profile, supabase: supabaseClient } = useAuth();

      useEffect(() => {
        if (!user) { setReports([]);
          setLoading(false); return; }

        const fetchReports = async () => {
          let query = supabaseClient.from('reports').select('*');
          if (profile?.role === 'SECTION') {
            query = query.eq('section_name', profile.section_name);
          } else if (profile?.role === 'AAO') {
            query = query.in('status', ['PENDING_AAO', 'SAO_RETURNED'])
              .eq('section_name', profile.mapped_section);
          } else if (profile?.role === 'SAO') {
            query = query.eq('status', 'AAO_APPROVED')
              .eq('section_name', profile.mapped_section);
          } else if (profile?.role === 'HINDI_CELL') {
            query = query.eq('status', 'SAO_APPROVED');
          }
          const { data, error } = await query.order('created_at', { ascending: false });
          if (!error) setReports(data || []);
          setLoading(false);
        };

        fetchReports();

        const channel = supabaseClient
          .channel('reports_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => fetchReports())
          .subscribe();

        return () => { supabaseClient.removeChannel(channel); };
      }, [user, profile]);

      return { reports, loading };
    }

    function useSections() {
      const [sections, setSections] = useState([]);
      const [loading, setLoading] = useState(true);
      const { supabase: supabaseClient, user } = useAuth();

      useEffect(() => {
        if (!user) { setSections([]);
          setLoading(false); return; }
        const fetchSections = async () => {
          const { data, error } = await supabaseClient
            .from('sections')
            .select('name')
            .eq('is_active', true)
            .order('name');
          if (!error) setSections(data.map(s => s.name));
          setLoading(false);
        };
        fetchSections();
      }, [user]);

      return { sections, loading };
    }

            ))}
          </div>

          {user.role !== "SECTION" && pendingForMe > 0 && (

            style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: r

                color: "#fff", boxShadow: `0 4px 18px ${r.color}40` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 28 }}>📥</span>
                <div style={{ textAlign: "left" }}><div style={{ fontWeight: 800, fontSize: 15 }}>{pendingForMe}
                    रिपोर्ट आपकी प्रतीक्षा में</div></div>
              </div><span style={{ fontSize: 22 }}>→</span>
            </button>

          {user.role === "HINDI_CELL" && (
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, border: "1.5px solid #e2e8f0" }}>
              <h3 style={{ fontSize: 16, fontWeight: 800, margin: "0 0 14px", color: "#1e293b" }}>📊 अनुभागों की रिपोर्ट
                जमा स्थिति</h3>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                {sections.map(sec => {
                  const hasSubmitted = reports.some(r => r.section_name === sec && r.status === "SUBMITTED");

                    <div key={sec} style={{ padding: "8px 14px", borderRadius: 8, fontSize: 12, fontWeight: 700,

      );
    }

    // ============================================================
    //  REPORT FORM (Simplified - Core fields only due to length)
    // ============================================================
    function ReportForm({ onSave, user, reports, initialData, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const set = (k, v) => setData(d => ({ ...d, [k]: v }));

      const isHindiSection = user.role === "HINDI_CELL" || user.section_name === "हिंदी अनुभाग";
      const isQ4 = data.quarter === "Q4";
      const showPart2 = isQ4 && isHindiSection;
      const totalSteps = showPart2 ? 4 : 3;

      const alreadySubmitted = !initialData && reports.some(r =>
        r.section_name === user.section_name &&
        r.year === data.year &&
        r.quarter === data.quarter
      );

      const validationErrors = useMemo(() => {
        const errs = [];
        const num = (v) => parseFloat(v) || 0;

        if (num(data.b1_s1_hindi_files) > num(data.b1_s1_total_files))
          errs.push("भाग 1(1): हिंदी फाइलें कुल फाइलों से अधिक नहीं हो सकतीं।");
        if (num(data.b1_s2_hindi_minutes) > num(data.b1_s2_total_meetings))
          errs.push("भाग 1(2): हिंदी बैठकें कुल बैठकों से अधिक नहीं हो सकतीं।");

        const sum3 = num(data.b1_s3_bilingual) + num(data.b1_s3_english_only) + num(data.b1_s3_hindi_only);
        if (num(data.b1_s3_total_issued) > 0 && sum3 !== num(data.b1_s3_total_issued))
          errs.push(`भाग 1(3): जारी दस्तावेजों का योग (${sum3}) कुल (${data.b1_s3_total_issued}) के बराबर होना चाहिए।`);

        const sum4Reply = num(data.b1_s4_hindi_reply) + num(data.b1_s4_english_reply) + num(data.b1_s4_no_reply_needed);
        if (num(data.b1_s4_total_received) > 0 && sum4Reply !== num(data.b1_s4_total_received))
          errs.push(`भाग 1(4): कुल उत्तरों का योग (${sum4Reply}) प्राप्त पत्रों (${data.b1_s4_total_received}) के बराबर होना चाहिए।`);

        if (showPart2) {
          if (num(data.b2_comp_trained) > num(data.b2_comp_total))
            errs.push("भाग 2(3): प्रशिक्षित कार्मिक कुल कार्मिकों से अधिक नहीं हो सकते।");
          if (num(data.b2_s4_unicode) > num(data.b2_s4_total_laptops))
            errs.push("भाग 2(4): यूनिकोड सक्षम लैपटॉप कुल लैपटॉप से अधिक नहीं हो सकते।");
          const pubsTotal = num(data.b2_publications_total);
          const pubsHindi = num(data.b2_publications_hindi);
          const pubsEng = num(data.b2_publications_eng);
          if (pubsHindi + pubsEng > pubsTotal)
            errs.push("भाग 2(9): हिंदी और अंग्रेजी प्रकाशनों का योग कुल प्रकाशनों से अधिक नहीं हो सकता।");
          if (num(data.b2_books_hindi_expenditure) > num(data.b2_books_expenditure))
            errs.push("भाग 2(10): हिंदी पुस्तकों पर व्यय कुल व्यय से अधिक नहीं हो सकता।");
        }
        return errs;
      }, [data, showPart2]);

      const handleSubmit = async () => {
        if (validationErrors.length > 0) return;
        setSubmitting(true);

        const report = { ...data };
        if (!report.section_name) report.section_name = user.section_name;

        if (!initialData) {
          report.status = "PENDING_AAO";
          report.timeline = [{ ts: new Date().toISOString(), role: "SECTION", name: user.section_name,
            action: "रिपोर्ट जमा की और AAO को भेजी", remark: "" }];
        } else {
          if (user.role === "SECTION" && report.status === "AAO_RETURNED") report.status = "PENDING_AAO";
          if (user.role === "AAO" && report.status === "SAO_RETURNED") report.status = "AAO_APPROVED";
          report.timeline = [...(report.timeline || []), { ts: new Date().toISOString(), role: user.role,
            name: user.section_name || user.role, action: "रिपोर्ट में संशोधन किया गया (Edited)", remark: "" }];
        }

        await onSave(report);
        setSubmitting(false);
        setDone(true);
      };

      if (done) return (
        <div style={{ textAlign: "center", padding: "60px 20px", background: "#fff", borderRadius: 20,
            border: "2px solid #d1fae5" }}>
          <div style={{ fontSize: 56 }}>🎉</div>
          <h2 style={{ fontSize: 20, fontWeight: 800, color: "#065f46", margin: "16px 0 8px" }}>
            {initialData ? "रिपोर्ट सफलतापूर्वक अपडेट होकर आगे भेज दी गई है!" : "रिपोर्ट AAO के पास भेज दी गई है!"}
          </h2>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#6366f1", background: "#eef2ff", display: "inline-block",
              padding: "8px 20px", borderRadius: 10 }}>{data.ackId}</div>
          <br />
          {initialData && <button onClick={onCancel}
              style={{ marginTop: 20, padding: "10px 20px", background: "#f1f5f9", borderRadius: 8, cursor: "pointer",
                border: "1px solid #cbd5e1", fontWeight: "bold", color: "#475569" }}>← वापस जाएँ</button>}
        </div>
      );

      const steps = ["कार्यालय विवरण", "भाग-I", ...(showPart2 ? ["भाग-II"] : []), "पूर्वावलोकन"];

      return (
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          {/* Step indicator */}
          <div className="no-print" style={{ background: "#fff", borderRadius: 14, padding: "14px 20px", marginBottom: 18,
              border: "1.5px solid #e2e8f0" }}>
            <div style={{ display: "flex", marginBottom: 8 }}>
              {steps.map((s, i) => (
                <div key={i} onClick={() => i < step && setStep(i)}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                  cursor: i < step ? "pointer" : "default" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", display: "flex", alignItems: "center",
                      justifyContent: "center", fontSize: 14, border: "2px solid", background: i === step ?
                        "#6366f1" : i < step ? "#d1fae5" : "#f8fafc", borderColor: i === step ? "#6366f1" :
                        i < step ? "#10b981" : "#e2e8f0" }}>{i < step ? "✓" : i + 1}</div>
                  <span style={{ fontSize: 10, color: i === step ? "#6366f1" : i < step ? "#10b981" : "#94a3b8",
                      fontWeight: i === step ? 700 : 400, textAlign: "center" }}>{s}</span>
                </div>
              ))}
            </div>
            <div style={{ height: 4, background: "#f1f5f9", borderRadius: 4 }}><div style={{ height: 4,
                background: "linear-gradient(90deg,#6366f1,#8b5cf6)", borderRadius: 4,
                width: `${(step / (totalSteps - 1)) * 100}%`, transition: "width 0.3s" }} /></div>
          </div>

          {/* Step 0: Office Details */}
          {step === 0 && (
            <div>
              {!showPart2 && (
                <div style={{ background: "#fff7ed", border: "1.5px solid #f97316", borderRadius: 10, padding: "12px 16px",
                    marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 24 }}>📌</span>
                  <div style={{ fontSize: 12, color: "#9a3412", fontWeight: 600 }}>राजभाषा रिपोर्ट भाग-II (वार्षिक रिपोर्ट)
                    केवल <strong>"हिंदी अनुभाग"</strong> द्वारा <strong>Q4 (जनवरी-मार्च)</strong> में भरा जाना है।</div>
                </div>
              )}
              <SecCard title="कार्यालय की जानकारी" icon="🏢" color={SECTION_COLORS[0]}>
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  <Inp label="कार्यालय का नाम और पूरा पता" value={data.officeNameAddress}
                    onChange={v => set("officeNameAddress", v)} placeholder="जैसे: प्र.नि.ले.प. रेलवे, मुंबई" />
                  <Grid cols={3}>
                    <Inp label="अधिकारी का नाम" value={data.officerName} onChange={v => set("officerName", v)} />
                    <Inp label="एस.टी.डी. कोड" value={data.stdCode} onChange={v => set("stdCode", v)} />
                    <Inp label="फोन नं." value={data.phone} onChange={v => set("phone", v)} />
                  </Grid>
                  <Grid>
                    <Inp label="ई-मेल" value={data.email} onChange={v => set("email", v)} type="email" />
                    <Inp label="राजभाषा अधिकारी का फोन/ईमेल" value={data.rbOfficerPhone}
                      onChange={v => set("rbOfficerPhone", v)} />
                  </Grid>
                  <Grid cols={3}>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#475569", textTransform: "uppercase",
                          display: "block", marginBottom: 6 }}>वर्ष</label>
                      <select value={data.year} onChange={e => set("year", e.target.value)}
                      style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0",
                        fontSize: 13 }}>
                        {YEARS.map(y => <option key={y}>{y}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{ fontSize: 11, fontWeight: 700, color: "#475569", textTransform: "uppercase",
                          display: "block", marginBottom: 6 }}>तिमाही</label>
                      <select value={data.quarter} onChange={e => set("quarter", e.target.value)}
                      style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0",
                        fontSize: 13 }}>
                        {QUARTERS.map(q => <option key={q.id} value={q.id}>{q.label}</option>)}
                      </select>
                    </div>
                    <Radio label="क्षेत्र" value={data.region} onChange={v => set("region", v)} options={["A", "B",
                      "C"]} />
                  </Grid>
                </div>
              </SecCard>
              {alreadySubmitted && (
                <div style={{ background: "#fee2e2", color: "#991b1b", padding: "14px 18px", borderRadius: 10,
                    border: "1.5px solid #ef4444", fontSize: 13, fontWeight: 700, marginTop: 16, display: "flex",
                    gap: 10, alignItems: "center" }}>
                  <span style={{ fontSize: 24 }}>⛔</span>
                  <div>आप <strong>{data.year}</strong> की <strong>{QUARTERS.find(q => q.id === data.quarter)?.label}</strong>
                    की रिपोर्ट पहले ही जमा कर चुके हैं।</div>
                </div>
              )}
            </div>
          )}

          {/* Step 1: Part I */}
          {step === 1 && (
            <div>
              <SecCard title="1. माननीय मंत्री जी को भेजी गई फाइलें" icon="📜" color={SECTION_COLORS[0]}>
                <Grid><Num label="कुल फाइलें" value={data.b1_s1_total_files} onChange={v => set("b1_s1_total_files",
                    v)} /><Num label="हिंदी में" value={data.b1_s1_hindi_files} onChange={v => set(
                      "b1_s1_hindi_files", v)} /></Grid>
              </SecCard>
              <SecCard title="2. सचिव/समकक्ष स्तर पर बैठकें/फाइलें" icon="🏛️" color={SECTION_COLORS[1]}>
                <Grid><Num label="I. कुल बैठकें" value={data.b1_s2_total_meetings} onChange={v => set(
                      "b1_s2_total_meetings", v)} /><Num label="II. हिंदी कार्यवाही" value={data.b1_s2_hindi_minutes}
                    onChange={v => set("b1_s2_hindi_minutes", v)} /><Num label="III. कुल कागजात" value={data
                      .b1_s2_total_docs} onChange={v => set("b1_s2_total_docs", v)} /><Num label="IV. हिंदी कागजात"
                    value={data.b1_s2_hindi_docs} onChange={v => set("b1_s2_hindi_docs", v)} /></Grid>
              </SecCard>
              <SecCard title="3. धारा 3(3) के अंतर्गत जारी दस्तावेज" icon="📄" color={SECTION_COLORS[2]}>
                <Grid><Num label="(क) कुल जारी" value={data.b1_s3_total_issued} onChange={v => set("b1_s3_total_issued",
                      v)} /><Num label="(ख) द्विभाषी" value={data.b1_s3_bilingual} onChange={v => set(
                      "b1_s3_bilingual", v)} /><Num label="(ग) केवल अंग्रेजी" value={data.b1_s3_english_only}
                    onChange={v => set("b1_s3_english_only", v)} /><Num label="(घ) केवल हिंदी" value={data
                      .b1_s3_hindi_only} onChange={v => set("b1_s3_hindi_only", v)} /></Grid>
              </SecCard>
              <SecCard title="4. हिंदी में प्राप्त पत्र" icon="📬" color={SECTION_COLORS[3]}>
                <Grid><Num label="(क) कुल प्राप्त" value={data.b1_s4_total_received} onChange={v => set(
                      "b1_s4_total_received", v)} /><Num label="(ख) उत्तर अपेक्षित नहीं" value={data
                      .b1_s4_no_reply_needed} onChange={v => set("b1_s4_no_reply_needed", v)} /><Num label="(ग) हिंदी/द्विभाषी उत्तर"
                    value={data.b1_s4_hindi_reply} onChange={v => set("b1_s4_hindi_reply", v)} /><Num label="(घ) अंग्रेजी में उत्तर"
                    value={data.b1_s4_english_reply} onChange={v => set("b1_s4_english_reply", v)} /></Grid>
              </SecCard>
              <SecCard title="5. अंग्रेजी पत्रों के उत्तर" icon="✉️" color={SECTION_COLORS[4]}>
                <TblInput headers={["क्षेत्र", "अंग्रेजी में प्राप्त", "हिंदी में उत्तर", "अंग्रेजी में उत्तर",
                    "उत्तर अपेक्षित नहीं"
                  ]} rows={[
                    [{ label: "'क' क्षेत्र" }, { key: "b1_s5_ka_total" }, { key: "b1_s5_ka_hindi_reply" },
                      { key: "b1_s5_ka_eng_reply" }, { key: "b1_s5_ka_no_reply" }
                    ],
                    [{ label: "'ख' क्षेत्र" }, { key: "b1_s5_kha_total" }, { key: "b1_s5_kha_hindi_reply" },
                      { key: "b1_s5_kha_eng_reply" }, { key: "b1_s5_kha_no_reply" }
                    ],
                  ]} data={data} onChange={(k, v) => set(k, v)} />
              </SecCard>
              <SecCard title="6. मूल पत्राचार" icon="📨" color={SECTION_COLORS[5]}>
                <TblInput headers={["क्षेत्र", "हिंदी में", "अंग्रेजी में", "कुल"]} rows={[
                    [{ label: "'क' क्षेत्र" }, { key: "b1_s6_ka_hindi" }, { key: "b1_s6_ka_english" },
                      { key: "b1_s6_ka_total" }
                    ],
                    [{ label: "'ख' क्षेत्र" }, { key: "b1_s6_kha_hindi" }, { key: "b1_s6_kha_english" },
                      { key: "b1_s6_kha_total" }
                    ],
                    [{ label: "'ग' क्षेत्र" }, { key: "b1_s6_ga_hindi" }, { key: "b1_s6_ga_english" },

    // ============================================================

    // ============================================================
    function Inbox({ reports, user, onAction, onEdit }) {
      const r = ROLES[user.role];
      const [selected, setSelected] = useState(null);
      const [remark, setRemark] = useState("");
      const [search, setSearch] = useState("");

      const filtered = reports.filter(x =>
        !search || x.section_name?.includes(search) || x.ackId?.includes(search)
      );

      if (selected) {
        const st = STATUS[selected.status] || STATUS.DRAFT;
        const canAct = (user.role === "SECTION" && selected.status === "AAO_RETURNED") ||
          (user.role === "AAO" && ["PENDING_AAO", "SAO_RETURNED"].includes(selected.status)) ||
          (user.role === "SAO" && selected.status === "AAO_APPROVED") ||
          (user.role === "HINDI_CELL" && selected.status === "SAO_APPROVED");

        const actionBtns = {
          SECTION: selected.status === "AAO_RETURNED" ? [{ label: "✅ AAO को पुनः भेजें", action: "PENDING_AAO",
              grad: "linear-gradient(135deg,#10b981,#0ea5e9)"
            }] : [],
          AAO: selected.status === "SAO_RETURNED" ? [{ label: "✅ SAO को पुनः भेजें", action: "AAO_APPROVED",
              grad: "linear-gradient(135deg,#10b981,#0ea5e9)"
            }] : [{ label: "✅ SAO को अग्रेषित करें", action: "AAO_APPROVED",
              grad: "linear-gradient(135deg,#10b981,#0ea5e9)"
            }, { label: "↩️ अनुभाग को वापस करें", action: "AAO_RETURNED",
              grad: "linear-gradient(135deg,#f97316,#ef4444)"
            }],
          SAO: [{ label: "✅ हिंदी प्रकोष्ठ को भेजें", action: "SAO_APPROVED",
              grad: "linear-gradient(135deg,#10b981,#0ea5e9)"
            }, { label: "↩️ AAO को वापस करें", action: "SAO_RETURNED",
              grad: "linear-gradient(135deg,#f97316,#ef4444)"
            }],
          HINDI_CELL: [{ label: "🎉 अंतिम स्वीकृति दें", action: "SUBMITTED",
              grad: "linear-gradient(135deg,#f59e0b,#10b981)"
            }, { label: "↩️ SAO को वापस करें", action: "SAO_RETURNED",
              grad: "linear-gradient(135deg,#dc2626,#9f1239)"
            }],
        };

        return (
          <div style={{ maxWidth: 760, margin: "0 auto" }}>
            <div className="no-print" style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                marginBottom: 16 }}>
              <button onClick={() => { setSelected(null);
                  setRemark(""); }} style={{ background: "none", border: "none", color: "#6366f1", cursor: "pointer",
                  fontSize: 13, fontWeight: 700 }}>← वापस सूची में</button>
              <div style={{ display: "flex", gap: 10 }}>
                <button onClick={() => { onEdit(selected);
                    setSelected(null); }} style={{ background: "#f59e0b", color: "#fff", border: "none",
                    padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer",
                    boxShadow: "0 4px 10px rgba(0,0,0,0.1)" }}>✏️ एडिट करें</button>
                <button onClick={() => window.print()} style={{ background: "#1e293b", color: "#fff", border: "none",
                    padding: "8px 16px", borderRadius: 8, fontSize: 12, fontWeight: 700, cursor: "pointer",
                    boxShadow: "0 4px 10px rgba(0,0,0,0.1)" }}>🖨️ PDF</button>
              </div>
            </div>

            <div style={{ background: r.grad || r.color, borderRadius: 16, padding: "18px 22px", marginBottom: 16,
                display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#fff" }}>{selected.section_name}</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,0.8)" }}>{QUARTERS.find(q => q.id === selected
                    ?.quarter)?.label || selected?.quarter || ''} · {selected.year} · {selected.ackId}</div>
              </div>
              <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 20, padding: "4px 14px", fontSize: 13,
                  fontWeight: 700, color: "#fff" }}>{st.icon} {st.label}</div>
            </div>

            {canAct && (
              <div className="no-print" style={{ background: "#fff", borderRadius: 14, border: `2px solid ${r.color}40`,
                  padding: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 800, color: "#1e293b", marginBottom: 12 }}>{r.icon} आपकी कार्रवाई
                </div>
                <textarea value={remark} onChange={e => setRemark(e.target.value)} rows={2} placeholder="टिप्पणी..."
                style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1.5px solid #e2e8f0",
                  marginBottom: 12 }} />
                <div style={{ display: "flex", gap: 12 }}>
                  {(actionBtns[user.role] || []).map(btn => (
                    <button key={btn.action} onClick={() => { onAction(selected, btn.action, remark);
                        setSelected(null);
                        setRemark(""); }}
                    style={{ flex: 1, padding: "12px 0", borderRadius: 12, border: "none", cursor: "pointer",
                      background: btn.grad, color: "#fff", fontWeight: 800 }}>{btn.label}</button>
                  ))}
                </div>
              </div>
            )}
          </div>
        );
      }

      return (
        <div style={{ background: "#fff", borderRadius: 18, border: "1.5px solid #e2e8f0", overflow: "hidden" }}>
          <div style={{ background: r.grad || r.color, padding: "16px 22px", display: "flex",
              justifyContent: "space-between", alignItems: "center" }}>
            <h2 style={{ fontSize: 15, fontWeight: 800, margin: 0, color: "#fff" }}>{user.role === "SECTION" ?
                "📋 मेरी रिपोर्टें" : "📥 आवक रिपोर्टें"}</h2>
          </div>
          <div style={{ padding: "12px 16px", background: "#f8fafc", borderBottom: "1px solid #e2e8f0" }}>
            <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="🔍 अनुभाग या पावती संख्या से खोजें..."
            style={{ width: "100%", boxSizing: "border-box", padding: "8px 12px", borderRadius: 8,
              border: "1.5px solid #e2e8f0", fontSize: 13 }} />
          </div>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 48, color: "#94a3b8" }}>
              <div style={{ fontSize: 40 }}>{user.role === "SECTION" ? "📂" : "📭"}</div>

          ) : (

    // ============================================================
    //  MASTER CONTROL
    // ============================================================
    function MasterControl({ reports, sections, onEditReport }) {
      const [searchQuery, setSearchQuery] = useState("");
      const [newSec, setNewSec] = useState("");
      const [isClearing, setIsClearing] = useState(false);
      const { supabase: supabaseClient } = useAuth();

      const filteredReports = reports.filter(r =>
        (r.section_name && r.section_name.includes(searchQuery)) ||
        (r.year && r.year.includes(searchQuery))
      );

      const handleAddSection = async () => {
        if (!newSec.trim()) return;
        if (sections.includes(newSec.trim())) {
          alert("यह अनुभाग पहले से मौजूद है!");
          return;
        }
        const { error } = await supabaseClient
          .from('sections')
          .insert([{ name: newSec.trim() }]);
        if (error) alert("Error: " + error.message);
        else { setNewSec(""); }
      };

      const handleDeleteSection = async (name) => {
        if (!confirm(`'${name}' को हटाएं?`)) return;
        const { error } = await supabaseClient
          .from('sections')
          .update({ is_active: false })
          .eq('name', name);
        if (error) alert("Error: " + error.message);
      };

      const handleResetAll = async () => {
        const pass = prompt("⚠️ 'RESET' टाइप करें:");
        if (pass !== "RESET") return;
        setIsClearing(true);
        try {
          const { data, error } = await supabaseClient
            .from('reports')
            .delete()
            .neq('status', 'SETTINGS');
          if (error) throw error;
          alert("✅ सभी रिपोर्टें मिटा दी गईं!");
        } catch (e) { alert("Error: " + e.message); }
        setIsClearing(false);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24, maxWidth: 800, margin: "0 auto" }}>
          <div style={{ background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: 16, padding: 24 }}>
            <h2 style={{ color: "#1e293b", margin: "0 0 8px", fontSize: 18, fontWeight: 800 }}>✏️ मास्टर रिपोर्ट एडिटर</h2>
            <p style={{ color: "#64748b", fontSize: 12, marginBottom: 16 }}>सभी अनुभागों की रिपोर्ट को एडिट करें</p>
            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
            placeholder="अनुभाग, वर्ष खोजें..."
            style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1.5px solid #cbd5e1",
              outline: "none", fontSize: 14, marginBottom: 16, boxSizing: "border-box" }} />

            <div style={{ maxHeight: "300px", overflowY: "auto", border: "1px solid #e2e8f0", borderRadius: 10 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead style={{ background: "#f8fafc", position: "sticky", top: 0 }}>
                  <tr>
                    <th style={{ padding: "10px", textAlign: "left", borderBottom: "1px solid #e2e8f0",
                        color: "#475569" }}>अनुभाग</th>
                    <th style={{ padding: "10px", textAlign: "left", borderBottom: "1px solid #e2e8f0",
                        color: "#475569" }}>तिमाही/वर्ष</th>
                    <th style={{ padding: "10px", textAlign: "center", borderBottom: "1px solid #e2e8f0",
                        color: "#475569" }}>कार्रवाई</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredReports.map(r => (
                    <tr key={r.id} style={{ borderBottom: "1px solid #f1f5f9" }}>
                      <td style={{ padding: "10px", color: "#1e293b", fontWeight: "bold" }}>{r.section_name}</td>
                      <td style={{ padding: "10px", color: "#64748b" }}>{QUARTERS.find(q => q.id === r?.quarter)
                          ?.label?.split('·')[0]} · {r.year}</td>
                      <td style={{ padding: "10px", textAlign: "center" }}>
                        <button onClick={() => onEditReport(r)}
                        style={{ background: "#f59e0b", color: "#fff", border: "none", padding: "6px 12px",
                          borderRadius: 6, cursor: "pointer", fontWeight: "bold", fontSize: 11 }}>✏️ एडिट</button>
                      </td>
                    </tr>
                  ))}
                  {filteredReports.length === 0 && (
                    <tr><td colSpan="3" style={{ padding: "20px", textAlign: "center", color: "#94a3b8" }}>कोई
                        रिपोर्ट नहीं</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          <div style={{ background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: 16, padding: 24 }}>
            <h2 style={{ color: "#1e293b", margin: "0 0 16px", fontSize: 18, fontWeight: 800 }}>⚙️ अनुभाग प्रबंधन</h2>
            <div style={{ display: "flex", gap: 10, marginBottom: 20 }}>
              <input value={newSec} onChange={e => setNewSec(e.target.value)}
              placeholder="नया अनुभाग..."
              style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: "1.5px solid #cbd5e1",
                outline: "none", fontSize: 14 }} />
              <button onClick={handleAddSection}
              style={{ background: "#6366f1", color: "#fff", border: "none", padding: "0 24px", borderRadius: 10,
                fontWeight: "bold", cursor: "pointer", fontSize: 14 }}>+ जोड़ें</button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
              {sections.map(s => (
                <div key={s} style={{ background: "#f8fafc", border: "1px solid #e2e8f0", borderRadius: 10,
                    padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center",
                    fontSize: 13, fontWeight: 700, color: "#475569" }}>
                  <span>{s}</span>
                  <button onClick={() => handleDeleteSection(s)}
                  style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 20,
                    lineHeight: 1 }}>×</button>
                </div>
              ))}
            </div>
          </div>

          <div style={{ background: "#fee2e2", border: "2px solid #ef4444", borderRadius: 16, padding: 24 }}>
            <h2 style={{ color: "#991b1b", margin: "0 0 10px", fontSize: 18, fontWeight: 800 }}>⚠️ डेंजर ज़ोन</h2>
            <p style={{ color: "#7f1d1d", fontSize: 13, marginBottom: 20 }}>सभी रिपोर्टें हमेशा के लिए डिलीट करें।</p>
            <button onClick={handleResetAll} disabled={isClearing}
            style={{ background: "#dc2626", color: "#fff", border: "none", padding: "12px 24px", borderRadius: 10,
              fontWeight: "bold", cursor: isClearing ? "not-allowed" : "pointer", display: "flex",
              alignItems: "center", gap: 8, fontSize: 14 }}>
              🗑️ {isClearing ? "डेटा मिटाया जा रहा..." : "रीसेट करें"}
            </button>
          </div>
        </div>
      );
    }

    // ============================================================
    //  MAIN APP
    // ============================================================
    function App() {
      return (
        <AuthProvider>
          <MainApp />
        </AuthProvider>
      );
    }

    function MainApp() {
      const { user, profile, signOut, loading } = useAuth();

      if (loading) return <LoadingSpinner />;
      if (!user || !profile) return <LoginScreen />;

      const { reports, loading: reportsLoading } = useReports();
      const { sections, loading: sectionsLoading } = useSections();
      const { supabase: supabaseClient } = useAuth();

      const [view, setView] = useState('dashboard');
      const [editingReport, setEditingReport] = useState(null);

      const handleSaveReport = async (reportData) => {
        const reportToSave = { ...reportData };
        if (!reportToSave.id) {
          // New report: validate via edge function
          try {
            const { data: validation, error: validationError } = await supabaseClient.functions.invoke(
              'validate-report', { body: { report: reportToSave } }
            );
            if (validationError) {
              alert('Validation server error');
              return;
            }
            if (!validation.valid) {
              alert(`❌ ${validation.errors.join('\n')}`);
              return;
            }
          } catch (e) {
            // If edge function not deployed, fallback to local validation
            console.warn('Edge function not available, using local validation');
          }
        }

        reportToSave.submitted_by = user.id;
        reportToSave.timeline = reportToSave.timeline || [];

        if (reportToSave.id) {
          const { error } = await supabaseClient
            .from('reports')
            .update(reportToSave)
            .eq('id', reportToSave.id);
          if (error) { alert('Error: ' + error.message); return; }
        } else {
          const { error } = await supabaseClient
            .from('reports')
            .insert([reportToSave]);
          if (error) { alert('Error: ' + error.message); return; }
        }
        setEditingReport(null);
        setView('inbox');
      };

      const handleAction = async (report, action, remark) => {
        const timelineEntry = {
          ts: new Date().toISOString(),
          role: profile.role,
          name: profile.section_name || profile.role,
          action: action,
          remark: remark || ''
        };
        const updatedTimeline = [...(report.timeline || []), timelineEntry];
        const { error } = await supabaseClient
          .from('reports')
          .update({ status: action, timeline: updatedTimeline, updated_at: new Date().toISOString() })
          .eq('id', report.id);
        if (error) alert('Error: ' + error.message);
      };

      if (reportsLoading || sectionsLoading) return <LoadingSpinner />;

      return (
        <div style={{ minHeight: '100vh', background: '#f8fafc', fontFamily: "'Noto Sans Devanagari','Inter',sans-serif" }}>
          {/* Navbar */}
          <nav style={{
            background: ROLES[profile.role]?.grad || ROLES[profile.role]?.color || '#6366f1',
            padding: '0 20px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            height: '56px',
            position: 'sticky',
            top: 0,
            zIndex: 200,
            boxShadow: `0 2px 16px ${ROLES[profile.role]?.color || '#6366f1'}60`
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <span style={{ fontSize: '22px' }}>🏛️</span>
              <div>
                <div style={{ fontSize: '13px', fontWeight: 800, color: '#fff', lineHeight: 1 }}>राजभाषा QPR</div>
                <div style={{ fontSize: '9px', color: 'rgba(255,255,255,0.65)' }}>Supabase · अनुलग्नक-2</div>
              </div>
            </div>

            <div style={{ display: 'flex', gap: '4px' }}>
              {[
                { id: 'dashboard', icon: '📊', label: 'डैशबोर्ड' },
                ...(profile.role === 'SECTION' ? [{ id: 'form', icon: '📝', label: 'नई रिपोर्ट' }] : []),
                { id: 'inbox', icon: '📥', label: profile.role === 'SECTION' ? 'मेरी रिपोर्टें' : 'आवक रिपोर्टें' },
                ...(profile.role === 'HINDI_CELL' ? [{ id: 'consolidated', icon: '📑', label: 'समेकित' }] : []),
                ...(profile.role === 'HINDI_CELL' ? [{ id: 'master', icon: '⚙️', label: 'मास्टर' }] : []),
              ].map(tab => (
                <button key={tab.id} onClick={() => { setView(tab.id);
                    setEditingReport(null); }}
                style={{
                  display: 'flex',
                  alignItems: 'center',
                  gap: '5px',
                  padding: '6px 12px',
                  borderRadius: '10px',
                  cursor: 'pointer',
                  fontSize: '12px',
                  border: 'none',
                  fontWeight: 600,
                  background: view === tab.id ? 'rgba(255,255,255,0.22)' : 'transparent',
                  color: view === tab.id ? '#fff' : 'rgba(255,255,255,0.7)'
                }}>
                  <span style={{ fontSize: '15px' }}>{tab.icon}</span>
                  <span>{tab.label}</span>
                </button>
              ))}
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{
                background: 'rgba(255,255,255,0.18)',
                borderRadius: '20px',
                padding: '4px 12px',
                fontSize: '11px',
                color: '#fff',
                fontWeight: 700
              }}>
                {ROLES[profile.role]?.icon} {profile.section_name || profile.role}
              </div>
              <button onClick={signOut}
              style={{
                fontSize: '11px',
                color: '#fecaca',
                background: 'rgba(220,38,38,0.2)',
                border: '1px solid rgba(220,38,38,0.35)',
                borderRadius: '8px',
                padding: '5px 10px',
                cursor: 'pointer',
                fontWeight: 700
              }}>बाहर</button>
            </div>
          </nav>

          <main style={{ maxWidth: '960px', margin: '0 auto', padding: '24px 16px 80px' }}>
            {view === 'dashboard' && (
              <Dashboard reports={reports} user={profile} setView={setView} sections={sections} />
            )}
            {view === 'form' && (
              <ReportForm
                onSave={handleSaveReport}
                user={profile}
                reports={reports}
                initialData={editingReport}
                onCancel={() => { setEditingReport(null);
                  setView('inbox'); }}
              />
            )}
            {view === 'inbox' && (
              <Inbox
                reports={reports}
                user={profile}
                onAction={handleAction}
                onEdit={(r) => { setEditingReport(r);
                  setView('form'); }}
              />
            )}
            {view === 'consolidated' && <ConsolidatedView reports={reports} sections={sections} />}
            {view === 'master' && profile.role === 'HINDI_CELL' && (
              <MasterControl
                reports={reports}
                sections={sections}
                onEditReport={(r) => { setEditingReport(r);
                  setView('form'); }}
              />
            )}
          </main>

          <footer style={{
            position: 'fixed',
            bottom: 0,
            left: 0,
            right: 0,
            background: 'linear-gradient(90deg,#1e1b4b,#312e81)',
            padding: '7px 22px',
            display: 'flex',
            justifyContent: 'space-between',
            fontSize: '10px',
            color: 'rgba(255,255,255,0.5)'
          }}>
            <span>© 2026 Digital India · राजभाषा QPR v5.0 (Supabase)</span>
            <span>पश्चिम रेलवे</span>
          </footer>
        </div>
      );
    }

    // ============================================================
    //  RENDER
    // ============================================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
