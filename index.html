   const fetchProfile = useCallback(async (userId) => {

      .from('profiles')

  }
}, []);
      useEffect(() => {

            setUser(session.user);
            fetchProfile(session.user.id);
          } else {
            setLoading(false);
          }
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange(
          async (event, session) => {
            if (session) {

              setLoading(true);
              await fetchProfile(session.user.id);
            } else {

    function useAuth() { return useContext(AuthContext); }

    function useReports() {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);
      const { user, profile, supabase: supabaseClient } = useAuth();

      useEffect(() => {
        if (!user || !profile) { setReports([]); setLoading(false); return; }

        const fetchReports = async () => {
          let query = supabaseClient.from('reports').select('*');
          if (profile?.role === 'SECTION') {
            query = query.eq('section_name', profile.section_name);
          } else if (profile?.role === 'AAO') {
            query = query.in('status', ['PENDING_AAO', 'SAO_RETURNED']).eq('section_name', profile.mapped_section);
          } else if (profile?.role === 'SAO') {
            query = query.eq('status', 'AAO_APPROVED').eq('section_name', profile.mapped_section);
          } else if (profile?.role === 'HINDI_CELL') {
            query = query.eq('status', 'SAO_APPROVED');
          }
          const { data, error } = await query.order('created_at', { ascending: false });
          if (!error) setReports(data || []);
          setLoading(false);
        };

        fetchReports();
        const channel = supabaseClient
          .channel('reports_changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => fetchReports())
          .subscribe();

        return () => { supabaseClient.removeChannel(channel); };
      }, [user, profile]);

      return { reports, loading };
    }

    function useSections() {
      const [sections, setSections] = useState([]);
      const [loading, setLoading] = useState(true);
      const { supabase: supabaseClient, user } = useAuth();

      useEffect(() => {
        if (!user) { setSections([]); setLoading(false); return; }
        const fetchSections = async () => {
          const { data, error } = await supabaseClient
            .from('sections')
            .select('name')
            .eq('is_active', true)
            .order('name');
          if (!error) setSections(data.map(s => s.name));
          setLoading(false);
        };
        fetchSections();
      }, [user]);

      return { sections, loading };
    }

      return (
        <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4c1d95 70%,#7c3aed 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' }}>
          <div style={{ background: 'rgba(255,255,255,0.97)', borderRadius: '24px', padding: '32px', maxWidth: '400px', width: '100%' }}>
            <div style={{ textAlign: 'center', marginBottom: '24px' }}>
              <div style={{ fontSize: '48px' }}>🏛️</div>
              <h1 style={{ fontSize: '24px', fontWeight: 800, color: '#1e293b' }}>राजभाषा पोर्टल</h1>
              <p style={{ fontSize: '12px', color: '#64748b' }}>तिमाही प्रगति रिपोर्ट · अनुलग्नक-2</p>
            </div>
            <form onSubmit={handleLogin}>
              <div style={{ marginBottom: '16px' }}>
                <label style={{ fontSize: '12px', fontWeight: 700, color: '#475569', display: 'block', marginBottom: '4px' }}>ईमेल</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="your-email@domain.com" required
                  style={{ width: '100%', padding: '10px 14px', borderRadius: '10px', border: '1.5px solid #e2e8f0', fontSize: '14px', boxSizing: 'border-box' }} />
              </div>
              <div style={{ marginBottom: '16px' }}>
                <label style={{ fontSize: '12px', fontWeight: 700, color: '#475569', display: 'block', marginBottom: '4px' }}>पासवर्ड</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" required
                  style={{ width: '100%', padding: '10px 14px', borderRadius: '10px', border: '1.5px solid #e2e8f0', fontSize: '14px', boxSizing: 'border-box' }} />
              </div>
              {error && <div style={{ fontSize: '12px', color: '#dc2626', background: '#fee2e2', padding: '8px 12px', borderRadius: '8px', marginBottom: '16px' }}>{error}</div>}
              <button type="submit" disabled={loading} style={{ width: '100%', padding: '12px', borderRadius: '12px', border: 'none', background: 'linear-gradient(135deg,#6366f1,#8b5cf6)', color: '#fff', fontWeight: 800, fontSize: '14px' }}>
                {loading ? 'लॉगिन हो रहा है...' : 'लॉगिन करें →'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function Dashboard({ reports, user, setView, sections }) {
      const r = ROLES[user.role] || { color: '#6366f1' };
      const myReports = user.role === 'SECTION' ? reports.filter(x => x.section_name === user.section_name) : reports;

      const inboxCount = {
        AAO: reports.filter(x => ['PENDING_AAO', 'SAO_RETURNED'].includes(x.status) && x.section_name === user.mapped_section).length,
        SAO: reports.filter(x => x.status === 'AAO_APPROVED' && x.section_name === user.mapped_section).length,
        HINDI_CELL: reports.filter(x => x.status === 'SAO_APPROVED').length
      };
      const pendingForMe = inboxCount[user.role] || 0;

      const stats = [
        { label: "कुल रिपोर्टें", value: myReports.length, icon: "📄", c: "#6366f1" },
        { label: "लंबित", value: pendingForMe, icon: "⏳", c: "#f59e0b" },
        { label: "स्वीकृत", value: myReports.filter(x => x.status === "SUBMITTED").length, icon: "✅", c: "#10b981" },
      ];

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 20px", border: "1.5px solid #e2e8f0" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#94a3b8", marginBottom: 10 }}>रिपोर्ट प्रवाह</div>
            <WorkflowPipeline currentRole={user.role} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(130px,1fr))", gap: 12 }}>
            {stats.map(s => (
              <div key={s.label} style={{ background: `${s.c}15`, borderRadius: 14, padding: "16px 18px", border: `1.5px solid ${s.c}30` }}>
                <div style={{ fontSize: 22 }}>{s.icon}</div>
                <div style={{ fontSize: 28, fontWeight: 800, color: s.c, marginTop: 4 }}>{s.value}</div>
                <div style={{ fontSize: 11, color: s.c, marginTop: 4, fontWeight: 600 }}>{s.label}</div>
              </div>
            ))}
          </div>
          {user.role !== "SECTION" && pendingForMe > 0 && (
            <button onClick={() => setView("inbox")} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: r.grad || r.color, borderRadius: 14, padding: "16px 22px", border: "none", color: "#fff", width: '100%', cursor: 'pointer' }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}><span style={{ fontSize: 28 }}>📥</span>
                <div style={{ textAlign: "left" }}><div style={{ fontWeight: 800, fontSize: 15 }}>{pendingForMe} रिपोर्ट आपकी प्रतीक्षा में</div></div>
              </div><span>→</span>
            </button>
          )}
        </div>
      );
    }

    function ReportForm({ onSave, user, reports, initialData, onCancel }) {
      const [data, setData] = useState(initialData || emptyForm());
      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const set = (k, v) => setData(d => ({ ...d, [k]: v }));

      const isHindiSection = user.role === "HINDI_CELL" || user.section_name === "हिंदी अनुभाग";
      const isQ4 = data.quarter === "Q4";
      const showPart2 = isQ4 && isHindiSection;
      const totalSteps = showPart2 ? 4 : 3;

      const alreadySubmitted = !initialData && reports.some(r => r.section_name === user.section_name && String(r.year) === String(data.year) && r.quarter === data.quarter);

      const validationErrors = useMemo(() => {
        const errs = [];
        const num = (v) => parseFloat(v) || 0;
        if (num(data.b1_s1_hindi_files) > num(data.b1_s1_total_files)) errs.push("भाग 1(1): हिंदी फाइलें कुल फाइलों से अधिक नहीं हो सकतीं।");
        if (num(data.b1_s2_hindi_minutes) > num(data.b1_s2_total_meetings)) errs.push("भाग 1(2): हिंदी बैठकें कुल बैठकों से अधिक नहीं हो सकतीं।");
        return errs;
      }, [data]);

      const handleSubmit = async () => {
        if (validationErrors.length > 0) return;
        setSubmitting(true);
        const report = { ...data };
        if (!report.section_name) report.section_name = user.section_name;

        if (!initialData) {
          report.status = "PENDING_AAO";
          report.timeline = [{ ts: new Date().toISOString(), role: "SECTION", name: user.section_name, action: "रिपोर्ट जमा की और AAO को भेजी", remark: "" }];
        } else {
          if (user.role === "SECTION" && report.status === "AAO_RETURNED") report.status = "PENDING_AAO";
          report.timeline = [...(report.timeline || []), { ts: new Date().toISOString(), role: user.role, name: user.section_name || user.role, action: "संशोधन किया गया", remark: "" }];
        }
        await onSave(report);
        setSubmitting(false);
        setDone(true);
      };

      if (done) return (
        <div style={{ textAlign: "center", padding: "60px 20px", background: "#fff", borderRadius: 20 }}>
          <div style={{ fontSize: 56 }}>🎉</div>
          <h2>सफलतापूर्वक जमा हो गया!</h2>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#6366f1" }}>{data.ackId}</div>
          <button onClick={onCancel} style={{ marginTop: 20, padding: '8px 16px' }}>वापस जाएँ</button>
        </div>
      );

      const steps = ["कार्यालय विवरण", "भाग-I", ...(showPart2 ? ["भाग-II"] : []), "पूर्वावलोकन"];

      return (
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <div className="no-print" style={{ background: "#fff", borderRadius: 14, padding: "14px 20px", marginBottom: 18, border: "1.5px solid #e2e8f0" }}>
            <div style={{ display: "flex", marginBottom: 8 }}>
              {steps.map((s, i) => (
                <div key={i} onClick={() => i < step && setStep(i)} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: i < step ? "pointer" : "default" }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: i === step ? "#6366f1" : i < step ? "#d1fae5" : "#f8fafc", color: i === step ? '#fff' : '#000' }}>{i < step ? "✓" : i + 1}</div>
                  <span style={{ fontSize: 10 }}>{s}</span>
                </div>
              ))}
            </div>
          </div>

          {step === 0 && (
            <SecCard title="कार्यालय की जानकारी" icon="🏢" color={SECTION_COLORS[0]}>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <Inp label="कार्यालय का नाम और पूरा पता" value={data.officeNameAddress} onChange={v => set("officeNameAddress", v)} />
                <Grid cols={3}>
                  <Inp label="अधिकारी का नाम" value={data.officerName} onChange={v => set("officerName", v)} />
                  <Inp label="एस.टी.डी. कोड" value={data.stdCode} onChange={v => set("stdCode", v)} />
                  <Inp label="फोन नं." value={data.phone} onChange={v => set("phone", v)} />
                </Grid>
                <Grid cols={3}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, display: "block", marginBottom: 6 }}>वर्ष</label>
                    <select value={data.year} onChange={e => set("year", e.target.value)} style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0" }}>
                      {YEARS.map(y => <option key={y}>{y}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, display: "block", marginBottom: 6 }}>तिमाही</label>
                    <select value={data.quarter} onChange={e => set("quarter", e.target.value)} style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0" }}>
                      {QUARTERS.map(q => <option key={q.id} value={q.id}>{q.label}</option>)}
                    </select>
                  </div>
                  <Radio label="क्षेत्र" value={data.region} onChange={v => set("region", v)} options={["A", "B", "C"]} />
                </Grid>
              </div>
            </SecCard>
          )}

          {step === 1 && (
            <div>
              <SecCard title="1. माननीय मंत्री जी को भेजी गई फाइलें" icon="📜" color={SECTION_COLORS[0]}>
                <Grid><Num label="कुल फाइलें" value={data.b1_s1_total_files} onChange={v => set("b1_s1_total_files", v)} /><Num label="हिंदी में" value={data.b1_s1_hindi_files} onChange={v => set("b1_s1_hindi_files", v)} /></Grid>
              </SecCard>
              <SecCard title="2. सचिव/समकक्ष स्तर पर बैठकें/फाइलें" icon="🏛️" color={SECTION_COLORS[1]}>
                <Grid><Num label="I. कुल बैठकें" value={data.b1_s2_total_meetings} onChange={v => set("b1_s2_total_meetings", v)} /><Num label="II. हिंदी कार्यवाही" value={data.b1_s2_hindi_minutes} onChange={v => set("b1_s2_hindi_minutes", v)} /></Grid>
              </SecCard>
            </div>
          )}

          {step === 2 && showPart2 && (
            <SecCard title="3. कंप्यूटर टंकण प्रशिक्षण" icon="🖥️" color={SECTION_COLORS[2]}>
              <Grid cols={2}><Num label="कुल कार्मिक" value={data.b2_comp_total} onChange={v => set("b2_comp_total", v)} /><Num label="प्रशिक्षित" value={data.b2_comp_trained} onChange={v => set("b2_comp_trained", v)} /></Grid>
            </SecCard>
          )}

          {((step === 2 && !showPart2) || (step === 3 && showPart2)) && (
            <div className="no-print" style={{ background: "#fff", borderRadius: 16, padding: 24, border: "1.5px solid #e2e8f0" }}>
              <h3>👁️ पूर्वावलोकन एवं प्रमाण-पत्र</h3>
              {validationErrors.length > 0 && (
                <div style={{ background: "#fee2e2", padding: 16, borderRadius: 12, border: "1.5px solid #ef4444", marginBottom: 16 }}>
                  {validationErrors.map((e, i) => <div key={i} style={{ color: "#991b1b" }}>⚠️ {e}</div>)}
                </div>
              )}
              <button onClick={handleSubmit} disabled={validationErrors.length > 0 || submitting} style={{ width: "100%", padding: "14px 0", borderRadius: 14, background: "linear-gradient(135deg,#6366f1,#8b5cf6)", color: "#fff", fontWeight: 800 }}>
                {submitting ? "जमा हो रहा है..." : "✅ रिपोर्ट अंतिम रूप से जमा करें"}
              </button>
            </div>
          )}

          <div className="no-print" style={{ display: "flex", justifyContent: "space-between", marginTop: 18 }}>
            <button type="button" onClick={() => setStep(s => Math.max(0, s - 1))} disabled={step === 0} style={{ padding: "9px 22px", borderRadius: 10, border: "1.5px solid #e2e8f0" }}>← पिछला</button>
            {step < totalSteps - 1 && <button type="button" onClick={() => setStep(s => s + 1)} disabled={step === 0 && alreadySubmitted} style={{ padding: "9px 22px", borderRadius: 10, color: "#fff", background: "linear-gradient(135deg,#6366f1,#8b5cf6)", border: "none" }}>अगला →</button>}
          </div>
        </div>
      );
    }

    function Inbox({ reports, user, onAction, onEdit }) {
      const r = ROLES[user.role] || { color: '#6366f1' };
      const [selected, setSelected] = useState(null);
      const [search, setSearch] = useState("");

      const filtered = reports.filter(x => {
        if (!search) return true;
        const secName = x.section_name ? String(x.section_name).toLowerCase() : "";
        const ack = x.ackId ? String(x.ackId).toLowerCase() : "";
        const query = search.toLowerCase();
        return secName.includes(query) || ack.includes(query);
      });

      if (selected) {
        return (
          <div style={{ maxWidth: 760, margin: "0 auto" }}>
            <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "#6366f1", cursor: "pointer", fontWeight: "bold" }}>← वापस सूची में</button>
            <div style={{ background: r.grad || r.color, borderRadius: 16, padding: "18px 22px", color: "#fff", marginTop: 12 }}>
              <div style={{ fontSize: 18, fontWeight: 800 }}>{selected.section_name}</div>
              <div>{selected.ackId} · {selected.year}</div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ background: "#fff", borderRadius: 18, border: "1.5px solid #e2e8f0", overflow: "hidden" }}>
          <div style={{ padding: "12px 16px", background: "#f8fafc" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 खोजें..." style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0" }} />
          </div>
          {filtered.map((rep) => (
            <div key={rep.id} onClick={() => setSelected(rep)} style={{ padding: "14px 20px", borderBottom: "1px solid #f1f5f9", cursor: "pointer" }}>
              <div style={{ fontWeight: "bold" }}>{rep.section_name}</div>
              <div style={{ fontSize: 11, color: "#94a3b8" }}>{rep.ackId} · {rep.year}</div>
            </div>
          ))}
        </div>
      );
    }

    function ConsolidatedView({ reports }) {
      const [q, setQ] = useState("Q4");
      const [y, setY] = useState("2026");
      const filtered = reports.filter(r => r.quarter === q && String(r.year) === String(y));

      return (
        <div style={{ padding: 20, background: "#fff", borderRadius: 12 }}>
          <h2 style={{ fontSize: 18, fontWeight: "bold" }}>📑 समेकित रिपोर्ट विवरण</h2>
          <div style={{ marginTop: 10 }}>सक्रिय रिपोर्टों की संख्या: {filtered.length}</div>
        </div>
      );
    }

    function MasterControl({ reports, sections, onEditReport }) {
      const [searchQuery, setSearchQuery] = useState("");
      const [newSec, setNewSec] = useState("");
      const { supabase: supabaseClient } = useAuth();

      const filteredReports = reports.filter(r => {
        const secName = r.section_name ? String(r.section_name).toLowerCase() : "";
        const yr = r.year ? String(r.year).toLowerCase() : "";
        const query = searchQuery.toLowerCase();
        return secName.includes(query) || yr.includes(query);
      });

      const handleAddSection = async () => {
        if (!newSec.trim()) return;
        const { error } = await supabaseClient.from('sections').insert([{ name: newSec.trim() }]);
        if (error) alert("त्रुटि: " + error.message);
        else setNewSec("");
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 24, maxWidth: 800, margin: "0 auto" }}>
          <div style={{ background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: 16, padding: 24 }}>
            <h2 style={{ fontSize: 18, fontWeight: 800 }}>✏️ मास्टर रिपोर्ट एडिटर</h2>
            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="खोजें..." style={{ width: "100%", padding: "10px 14px", borderRadius: 10, border: "1.5px solid #cbd5e1", marginTop: 12 }} />
            <div style={{ marginTop: 12 }}>
              {filteredReports.map(r => (
                <div key={r.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #f1f5f9" }}>
                  <span style={{ fontWeight: "bold" }}>{r.section_name} ({r.year})</span>
                  <button onClick={() => onEditReport(r)} style={{ background: "#f59e0b", color: "#fff", padding: "4px 8px", borderRadius: 6, border: "none" }}>✏️ एडिट</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() { return <AuthProvider><MainApp /></AuthProvider>; }

    function MainApp() {
      const { user, profile, signOut, loading } = useAuth();
      if (loading) return <LoadingSpinner />;
      if (!user || !profile) return <LoginScreen />;

      const { reports, loading: reportsLoading } = useReports();
      const { sections, loading: sectionsLoading } = useSections();
      const [view, setView] = useState('dashboard');
      const [editingReport, setEditingReport] = useState(null);

      if (reportsLoading || sectionsLoading) return <LoadingSpinner />;

      return (
        <div style={{ minHeight: '100vh', background: '#f8fafc', fontFamily: "'Noto Sans Devanagari', sans-serif" }}>
          <nav style={{ background: ROLES[profile.role]?.grad || '#6366f1', padding: '12px 20px', display: 'flex', justifyContent: 'space-between', color: '#fff', alignItems: 'center' }}>
            <span style={{ fontWeight: 800 }}>🏛️ राजभाषा QPR</span>
            <div style={{ display: "flex", gap: "14px" }}>
              <button onClick={() => setView('dashboard')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>डैशबोर्ड</button>
              {profile.role === 'SECTION' && <button onClick={() => { setEditingReport(null); setView('form'); }} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>नई रिपोर्ट</button>}
              <button onClick={() => setView('inbox')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>इनबॉक्स</button>
              {profile.role === 'HINDI_CELL' && <button onClick={() => setView('consolidated')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>समेकित</button>}
              {profile.role === 'HINDI_CELL' && <button onClick={() => setView('master')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>मास्टर</button>}
              <button onClick={signOut} style={{ color: "#fecaca", background: 'transparent', border: 'none', cursor: 'pointer', fontWeight: 700 }}>बाहर</button>
            </div>
          </nav>
          <main style={{ maxWidth: '960px', margin: '0 auto', padding: '24px 16px' }}>
            {view === 'dashboard' && <Dashboard reports={reports} user={profile} setView={setView} sections={sections} />}
            {view === 'form' && <ReportForm onSave={async (rep) => { await supabase.from('reports').upsert(rep); setView('inbox'); }} user={profile} reports={reports} initialData={editingReport} onCancel={() => setView('inbox')} />}
            {view === 'inbox' && <Inbox reports={reports} user={profile} onEdit={(r) => { setEditingReport(r); setView('form'); }} />}
            {view === 'consolidated' && <ConsolidatedView reports={reports} sections={sections} />}
            {view === 'master' && profile.role === 'HINDI_CELL' && <MasterControl reports={reports} sections={sections} onEditReport={(r) => { setEditingReport(r); setView('form'); }} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
