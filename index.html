<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#312e81" />
  
  <!-- Updated mobile settings to avoid deprecation warnings -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="राजभाषा QPR" />
  <title>राजभाषा QPR · Supabase</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase UMD Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    @media screen {
      .print-only { display: none !important; }
    }
    .standard-doc {
      width: 100%;
      line-height: 1.4;
      color: #000;
      font-family: 'Noto Sans Devanagari', 'Times New Roman', serif;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }
    .standard-doc table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
      border: 1px solid #000;
    }
    .standard-doc th, .standard-doc td {
      border: 1px solid #000;
      padding: 6px 8px;
      font-size: 10.5pt;
      color: #000;
    }
    .standard-doc th {
      font-weight: bold;
      background-color: #f2f2f2 !important;
    }
    .spinner {
      border: 4px solid #f3f4f6;
      border-top: 4px solid #6366f1;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, createContext, useContext } = React;

    const SUPABASE_URL = "https://ykooktqnxunmoenucdoy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Wo14uG3EowORP_eHV7SMlw_o1HLqU0f";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const ROLES = {
      SECTION: { id: "SECTION", label: "अनुभाग", icon: "🏢", color: "#6366f1", bg: "#eef2ff", grad: "linear-gradient(135deg,#6366f1,#8b5cf6)" },
      AAO: { id: "AAO", label: "AAO", icon: "🔎", color: "#0ea5e9", bg: "#f0f9ff", grad: "linear-gradient(135deg,#0ea5e9,#6366f1)" },
      SAO: { id: "SAO", label: "SAO", icon: "✅", color: "#10b981", bg: "#ecfdf5", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" },
      HINDI_CELL: { id: "HINDI_CELL", label: "हिंदी प्रकोष्ठ", icon: "🏛️", color: "#f59e0b", bg: "#fffbeb", grad: "linear-gradient(135deg,#f59e0b,#ef4444)" },
    };

    const STATUS = {
      DRAFT: { id: "DRAFT", label: "मसौदा", icon: "📝", color: "#94a3b8", bg: "#f8fafc" },
      PENDING_AAO: { id: "PENDING_AAO", label: "AAO के पास", icon: "⏳", color: "#6366f1", bg: "#eef2ff" },
      AAO_APPROVED: { id: "AAO_APPROVED", label: "AAO स्वीकृत", icon: "✔️", color: "#0ea5e9", bg: "#f0f9ff" },
      AAO_RETURNED: { id: "AAO_RETURNED", label: "AAO ने वापस किया", icon: "↩️", color: "#f97316", bg: "#fff7ed" },
      SUBMITTED: { id: "SUBMITTED", label: "स्वीकृत", icon: "🎉", color: "#16a34a", bg: "#dcfce7" }
    };

    const QUARTERS = [
      { id: "Q1", label: "Q1 · अप्रैल–जून" },
      { id: "Q2", label: "Q2 · जुलाई–सितंबर" },
      { id: "Q3", label: "Q3 · अक्टूबर–दिसंबर" },
      { id: "Q4", label: "Q4 · जनवरी–मार्च" },
    ];
    const YEARS = ["2022", "2023", "2024", "2025", "2026", "2027", "2028", "2029", "2030"];
    const SECTION_COLORS = [{ bg: "#ede9fe", border: "#8b5cf6", text: "#5b21b6", icon: "📜" }];

    function genId() { return `RAJ-${Date.now().toString(36).toUpperCase().slice(-7)}`; }

    function emptyForm() {
      return {
        officeNameAddress: "", officerName: "", stdCode: "", phone: "", email: "", year: "2026", quarter: "Q4", region: "B", ackId: genId(),
        b1_s1_total_files: "", b1_s1_hindi_files: "", b1_s2_total_meetings: "", b1_s2_hindi_minutes: ""
      };
    }

    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      const fetchProfile = useCallback(async (userId) => {
        try {
          // ✅ FIXED: Using maybeSingle() instead of single() to avoid strict 406/404 server reactions
          const { data, error } = await supabase
            .from('profiles')
            .select('*')
            .eq('id', userId)
            .maybeSingle();

          if (data) {
            setProfile(data);
          } else {
            console.warn("⚠️ Profile row not found. Using safe client fallback role.");
            // Safe Fallback so your dashboard/form renders immediately even if database table row is missing
            setProfile({
              id: userId,
              role: "SECTION",
              section_name: "सामान्य अनुभाग",
              mapped_section: "सामान्य अनुभाग"
            });
          }
        } catch (e) {
          console.error("Profile extraction crash:", e);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            setUser(session.user);
            fetchProfile(session.user.id);
          } else {
            setLoading(false);
          }
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange(
          async (event, session) => {
            if (session) {
              setUser(session.user);
              setLoading(true);
              await fetchProfile(session.user.id);
            } else {
              setUser(null);
              setProfile(null);
              setLoading(false);
            }
          }
        );
        return () => subscription.unsubscribe();
      }, [fetchProfile]);

      const signIn = async (email, password) => {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        return data;
      };

      const signOut = async () => {
        await supabase.auth.signOut();
        setUser(null);
        setProfile(null);
      };

      return (
        <AuthContext.Provider value={{ user, profile, loading, signIn, signOut, supabase }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }

    function useReports() {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);
      const { user, profile } = useAuth();

      useEffect(() => {
        if (!user || !profile) { setReports([]); setLoading(false); return; }

        const fetchReports = async () => {
          try {
            let query = supabase.from('reports').select('*');
            if (profile.role === 'SECTION') {
              query = query.eq('section_name', profile.section_name);
            }
            const { data, error } = await query;
            if (!error && data) setReports(data);
          } catch(e) {
            console.error(e);
          } finally {
            setLoading(false);
          }
        };
        fetchReports();
      }, [user, profile]);

      return { reports, loading };
    }

    function useSections() {
      const [sections, setSections] = useState([]);
      const [loading, setLoading] = useState(true);
      const { user } = useAuth();

      useEffect(() => {
        if (!user) { setSections([]); setLoading(false); return; }
        const fetchSections = async () => {
          try {
            const { data } = await supabase.from('sections').select('name').eq('is_active', true);
            if (data) setSections(data.map(s => s.name));
          } catch(e) {}
          setLoading(false);
        };
        fetchSections();
      }, [user]);

      return { sections, loading };
    }

    const Inp = ({ label, value, onChange, type = "text" }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        <label style={{ fontSize: 11, fontWeight: 700, color: "#475569" }}>{label}</label>
        <input type={type} value={value} onChange={e => onChange(e.target.value)} style={{ padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13 }} />
      </div>
    );

    const Num = ({ label, value, onChange }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
        <label style={{ fontSize: 11, fontWeight: 700, color: "#475569" }}>{label}</label>
        <input type="number" min={0} value={value} onChange={e => onChange(e.target.value)} style={{ padding: "7px 10px", borderRadius: 7, border: "1.5px solid #e2e8f0", fontSize: 13 }} />
      </div>
    );

    const Radio = ({ label, value, onChange, options }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        <label style={{ fontSize: 11, fontWeight: 700 }}>{label}</label>
        <div style={{ display: "flex", gap: 8 }}>
          {options.map(o => (
            <button key={o} type="button" onClick={() => onChange(o)} style={{ padding: "5px 14px", borderRadius: 20, fontSize: 12, border: "1.5px solid", background: value === o ? "#6366f1" : "#fff", color: value === o ? "#fff" : "#475569" }}>{o}</button>
          ))}
        </div>
      </div>
    );

    const Grid = ({ children }) => <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>{children}</div>;
    const SecCard = ({ title, icon, color, children }) => (
      <div style={{ borderRadius: 14, border: `2px solid ${color.border}`, overflow: "hidden", marginBottom: 14 }}>
        <div style={{ background: color.bg, padding: "12px 18px", color: color.text, fontWeight: "bold" }}>{icon} {title}</div>
        <div style={{ background: "#fff", padding: 18 }}>{children}</div>
      </div>
    );

    function Dashboard({ reports, user, setView }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "20px", border: "1.5px solid #e2e8f0", textAlign: 'center' }}>
            <h2 style={{ fontSize: 20, fontWeight: 800 }}>नमस्ते, आपका स्वागत है! 🏛️</h2>
            <p style={{ color: '#64748b', fontSize: 13, marginTop: 4 }}>आप सफलतापूर्वक लॉग-इन हो चुके हैं। नीचे दी गई प्रगति रिपोर्ट भरें।</p>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <div style={{ background: "#eef2ff", padding: 16, borderRadius: 12, flex: 1 }}>
              <div style={{ fontSize: 24, fontWeight: 800, color: "#6366f1" }}>{reports.length}</div>
              <div style={{ fontSize: 12, color: "#6366f1" }}>कुल प्रविष्टियां</div>
            </div>
          </div>
        </div>
      );
    }

    function ReportForm({ onSave, user }) {
      const [data, setData] = useState(emptyForm());
      const set = (k, v) => setData(d => ({ ...d, [k]: v }));

      return (
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <SecCard title="कार्यालय का मूल विवरण" icon="🏢" color={SECTION_COLORS[0]}>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <Inp label="कार्यालय का नाम और पूरा पता" value={data.officeNameAddress} onChange={v => set("officeNameAddress", v)} />
              <Grid>
                <Inp label="अधिकारी का नाम" value={data.officerName} onChange={v => set("officerName", v)} />
                <Inp label="फोन नं." value={data.phone} onChange={v => set("phone", v)} />
              </Grid>
              <Grid>
                <div>
                  <label style={{ fontSize: 11, display: "block", marginBottom: 4 }}>वर्ष</label>
                  <select value={data.year} onChange={e => set("year", e.target.value)} style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0" }}>
                    {YEARS.map(y => <option key={y}>{y}</option>)}
                  </select>
                </div>
                <Radio label="क्षेत्र" value={data.region} onChange={v => set("region", v)} options={["A", "B", "C"]} />
              </Grid>
            </div>
          </SecCard>

          <SecCard title="भाग 1: पत्राचार विवरण" icon="📜" color={SECTION_COLORS[0]}>
            <Grid>
              <Num label="कुल फाइलें" value={data.b1_s1_total_files} onChange={v => set("b1_s1_total_files", v)} />
              <Num label="हिंदी में फाइलें" value={data.b1_s1_hindi_files} onChange={v => set("b1_s1_hindi_files", v)} />
            </Grid>
          </SecCard>

          <button onClick={() => onSave(data)} style={{ width: "100%", padding: "14px", borderRadius: 12, background: "linear-gradient(135deg,#6366f1,#8b5cf6)", color: "#fff", fontWeight: 800, border: 'none', cursor: 'pointer' }}>
            ✅ डेटा सुरक्षित करें (Submit Report)
          </button>
        </div>
      );
    }

    function Inbox({ reports }) {
      return (
        <div style={{ background: "#fff", padding: 16, borderRadius: 12, border: "1.5px solid #e2e8f0" }}>
          <h3 style={{ fontWeight: 'bold', marginBottom: 12 }}>मेरी भेजी गई रिपोर्ट्स</h3>
          {reports.length === 0 ? <p style={{ color: '#94a3b8', fontSize: 13 }}>कोई रिपोर्ट नहीं मिली।</p> : 
            reports.map(r => (
              <div key={r.id} style={{ padding: 10, borderBottom: "1px solid #f1f5f9" }}>
                <div style={{ fontWeight: 'bold' }}>{r.officeNameAddress || "विवरण उपलब्ध नहीं"}</div>
                <div style={{ fontSize: 11, color: '#94a3b8' }}>वर्ष: {r.year} | पावती: {r.ackId}</div>
              </div>
            ))
          }
        </div>
      );
    }

    function App() { return <AuthProvider><MainApp /></AuthProvider>; }

    function MainApp() {
      const { user, profile, signOut, loading } = useAuth();
      if (loading) return <LoadingSpinner />;
      if (!user || !profile) return <LoginScreen />;

      const { reports, loading: reportsLoading } = useReports();
      const [view, setView] = useState('dashboard');

      if (reportsLoading) return <LoadingSpinner />;

      return (
        <div style={{ minHeight: '100vh', background: '#f8fafc', fontFamily: "sans-serif" }}>
          <nav style={{ background: '#312e81', padding: '14px 20px', display: 'flex', justifyContent: 'space-between', color: '#fff', alignItems: 'center' }}>
            <span style={{ fontWeight: 800 }}>🏛️ राजभाषा पोर्टल (Supabase)</span>
            <div style={{ display: "flex", gap: "16px" }}>
              <button onClick={() => setView('dashboard')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>डैशबोर्ड</button>
              <button onClick={() => setView('form')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>डाटा फिलिंग (Form)</button>
              <button onClick={() => setView('inbox')} style={{ background: 'transparent', border: 'none', color: '#fff', cursor: 'pointer', fontWeight: 600 }}>इतिहास (Inbox)</button>
              <button onClick={signOut} style={{ color: "#fecaca", background: 'transparent', border: 'none', cursor: 'pointer', fontWeight: 700 }}>लॉगआउट</button>
            </div>
          </nav>
          <main style={{ maxWidth: '960px', margin: '0 auto', padding: '24px 16px' }}>
            {view === 'dashboard' && <Dashboard reports={reports} user={profile} setView={setView} />}
            {view === 'form' && <ReportForm onSave={async (rep) => { rep.submitted_by = user.id; rep.section_name = profile.section_name; await supabase.from('reports').upsert(rep); setView('inbox'); }} user={profile} />}
            {view === 'inbox' && <Inbox reports={reports} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
