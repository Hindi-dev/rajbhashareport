    // ============================================================

    // ============================================================
    const SUPABASE_URL = "https://ykooktqnxunmoenucdoy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Wo14uG3EowORP_eHV7SMlw_o1HLqU0f";
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================================
    //  CONSTANTS & WORKFLOW LOGIC
    // ============================================================
    const ROLES = {

      SAO: { label: "SAO", icon: "✅", color: "#10b981", bg: "#ecfdf5", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" },
      HINDI_CELL: { label: "हिंदी प्रकोष्ठ", icon: "🏛️", color: "#f59e0b", bg: "#fffbeb", grad: "linear-gradient(135deg,#f59e0b,#ef4444)" },
    };

    const STATUS = {
      DRAFT: { label: "मसौदा", icon: "📝", color: "#94a3b8", bg: "#f8fafc" },
      PENDING_AAO: { label: "AAO के पास", icon: "⏳", color: "#6366f1", bg: "#eef2ff" },
      AAO_APPROVED: { label: "AAO स्वीकृत", icon: "✔️", color: "#0ea5e9", bg: "#f0f9ff" },
      AAO_RETURNED: { label: "AAO ने वापस किया", icon: "↩️", color: "#f97316", bg: "#fff7ed" },
      PENDING_SAO: { label: "SAO के पास", icon: "⏳", color: "#10b981", bg: "#ecfdf5" },
      SAO_APPROVED: { label: "SAO स्वीकृत", icon: "✔️", color: "#10b981", bg: "#d1fae5" },
      SAO_RETURNED: { label: "SAO ने वापस किया", icon: "↩️", color: "#f97316", bg: "#fff7ed" },
      SUBMITTED: { label: "हिंदी प्रकोष्ठ स्वीकृत", icon: "🎉", color: "#16a34a", bg: "#dcfce7" },
    };

    const WORKFLOW_ACTIONS = {
      DEO: {
        AAO_RETURNED: [{ label: "✅ सुधार कर AAO को पुनः भेजें", action: "PENDING_AAO", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" }],
      },
      AAO: {
        PENDING_AAO: [
          { label: "✅ SAO को अग्रेषित करें", action: "PENDING_SAO", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" }, 
          { label: "↩️ अनुभाग (DEO) को वापस करें", action: "AAO_RETURNED", grad: "linear-gradient(135deg,#f97316,#ef4444)" }
        ],
        SAO_RETURNED: [
          { label: "✅ SAO को पुनः भेजें", action: "PENDING_SAO", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" }, 
          { label: "↩️ अनुभाग (DEO) को वापस करें", action: "AAO_RETURNED", grad: "linear-gradient(135deg,#f97316,#ef4444)" }
        ],
      },
      SAO: {
        PENDING_SAO: [
          { label: "✅ हिंदी प्रकोष्ठ को भेजें", action: "SAO_APPROVED", grad: "linear-gradient(135deg,#10b981,#0ea5e9)" }, 
          { label: "↩️ AAO को वापस करें", action: "SAO_RETURNED", grad: "linear-gradient(135deg,#f97316,#ef4444)" }
        ],
      },
      HINDI_CELL: {
        SAO_APPROVED: [
          { label: "🎉 अंतिम स्वीकृति दें", action: "SUBMITTED", grad: "linear-gradient(135deg,#f59e0b,#10b981)" }, 
          { label: "↩️ SAO को वापस करें", action: "SAO_RETURNED", grad: "linear-gradient(135deg,#dc2626,#9f1239)" }
        ],
      },
    };

    const workflowActionsFor = (role, status) => WORKFLOW_ACTIONS[role]?.[status] || [];
    
    const QUARTERS = [{ id: "Q1", label: "Q1 · अप्रैल–जून" }, { id: "Q2", label: "Q2 · जुलाई–सितंबर" }, { id: "Q3", label: "Q3 · अक्टूबर–दिसंबर" }, { id: "Q4", label: "Q4 · जनवरी–मार्च" }];
    const YEARS = ["2024", "2025", "2026", "2027"];

    function genId() { return `RAJ-${Date.now().toString(36).toUpperCase().slice(-7)}`; }

    // ============================================================
    //  AUTH CONTEXT
    // ============================================================
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);
      const [loading, setLoading] = useState(true);

      const fetchProfile = useCallback(async (authUser) => {
        if (!authUser) return null;
        
        const { data: profData, error: profErr } = await supabase.from('profiles').select('*').eq('id', authUser.id).maybeSingle();
        
        if (profErr || !profData) {
          setProfile(null);
          throw new Error("No profile found for user in database.");
        }

        if (profData.section_id) {
          const { data: secData } = await supabase.from('sections').select('section_name').eq('id', profData.section_id).maybeSingle();
          profData.section_name = secData?.section_name || `Section ${profData.section_id}`;
        } else {
          profData.section_name = "सभी अनुभाग";
        }

        setProfile(profData);
        return profData;
      }, []);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          if (session?.user) {
            setUser(session.user);
            fetchProfile(session.user).finally(() => setLoading(false));
          } else {
            setLoading(false);
          }
        });

        const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
          if (session?.user) {
            setUser(session.user);
            fetchProfile(session.user);
          } else {
            setUser(null);
            setProfile(null);
          }
        });
        return () => subscription.unsubscribe();
      }, [fetchProfile]);

      const signIn = async (email, password) => {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        await fetchProfile(data.user);
      };

      const signOut = () => supabase.auth.signOut();

      return <AuthContext.Provider value={{ user, profile, loading, signIn, signOut, supabase }}>{children}</AuthContext.Provider>;
    }

    function useAuth() { return useContext(AuthContext); }

    // ============================================================
    //  DATA HOOKS
    // ============================================================
    function useReports() {
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);
      const { user, profile } = useAuth();

      useEffect(() => {
        if (!user || !profile) return;

        const fetchReports = async () => {
          const { data, error } = await supabase.from('reports').select('*').order('created_at', { ascending: false });
          if (!error) setReports(data || []);
          setLoading(false);
        };

        fetchReports();

        const channel = supabase.channel('db-reports-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'reports' }, () => { fetchReports(); })
          .subscribe();

        return () => supabase.removeChannel(channel);
      }, [user, profile]);

      return { reports, loading };
    }

    function useSections() {
      const [sections, setSections] = useState([]);
      useEffect(() => {
        supabase.from('sections').select('section_name').order('id').then(({ data }) => {
          if (data) setSections(data.map(s => s.section_name));
        });
      }, []);
      return sections;
    }

    // ============================================================
    //  UI COMPONENTS
    // ============================================================
    const Inp = ({ label, value, onChange, type = "text", disabled = false }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {label && <label style={{ fontSize: 12, fontWeight: 700, color: "#475569" }}>{label}</label>}
        <input type={type} value={value} onChange={e => onChange(e.target.value)} disabled={disabled}
          style={{ padding: "10px 14px", borderRadius: 8, border: "1.5px solid #cbd5e1", fontSize: 15, background: disabled ? "#f1f5f9" : "#fff", outline: "none", width: "100%", fontFamily: "inherit" }} />
      </div>
    );

    const Num = ({ label, value, onChange, disabled = false }) => (
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {label && <label style={{ fontSize: 12, fontWeight: 700, color: "#475569" }}>{label}</label>}
        <input type="number" min={0} value={value} onChange={e => onChange(e.target.value)} disabled={disabled}
          style={{ padding: "10px 14px", borderRadius: 8, border: "1.5px solid #cbd5e1", fontSize: 15, fontWeight: 600, background: disabled ? "#f1f5f9" : "#fff", outline: "none", width: "100%", fontFamily: "inherit" }} />
      </div>
    );

    const SecCard = ({ title, icon, children }) => {
      return (
        <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #e2e8f0", overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.03)" }}>
          <div style={{ background: "#f8fafc", padding: "14px 20px", borderBottom: "1px solid #e2e8f0", display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 20 }}>{icon}</span>
            <span style={{ fontSize: 15, fontWeight: 800, color: "#1e293b" }}>{title}</span>
          </div>
          <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>{children}</div>
        </div>
      );
    };

    const Grid = ({ cols = 2, children }) => (
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${cols},1fr)`, gap: 16 }}>{children}</div>
    );

    // ============================================================
    //  LOGIN SCREEN (MATCHES SCREENSHOT EXACTLY)
    // ============================================================
    function LoginScreen() {
      const [selectedRole, setSelectedRole] = useState(null); // Tracks if a card was clicked
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      const { signIn } = useAuth();

      const roles = [
        { id: 'DEO', title: 'अनुभाग', desc: 'रिपोर्ट भरें और AAO को भेजें', icon: '🏢', grad: 'linear-gradient(to right, #8b5cf6, #7c3aed)' },
        { id: 'AAO', title: 'AAO', desc: 'अनुभाग की रिपोर्ट जाँचें और SAO को भेजें', icon: '🔎', grad: 'linear-gradient(to right, #0ea5e9, #3b82f6)' },
        { id: 'SAO', title: 'SAO', desc: 'AAO की अनुशंसा स्वीकृत करें और आगे भेजें', icon: '✅', grad: 'linear-gradient(to right, #10b981, #06b6d4)' },
        { id: 'HINDI_CELL', title: 'हिंदी प्रकोष्ठ', desc: 'SAO से आई रिपोर्ट अंतिम रूप से स्वीकार करें', icon: '🏛️', grad: 'linear-gradient(to right, #f59e0b, #ef4444)' },
        { id: 'ADMIN', title: 'सुपर एडमिन', desc: 'पूरे सिस्टम का नियंत्रण और मास्टर रीसेट', icon: '👑', grad: 'linear-gradient(to right, #dc2626, #9f1239)' }
      ];

      const handleLogin = async (e) => {
        e.preventDefault();
        setError(''); setLoading(true);
        try { await signIn(email, password); } 
        catch (err) { setError("ईमेल या पासवर्ड गलत है।"); } 
        finally { setLoading(false); }
      };

      // VIEW 1: ROLE SELECTION (Matches your provided screenshot perfectly)
      if (!selectedRole) {
        return (

              {roles.map(r => (

                style={{ width: '100%', background: r.grad, borderRadius: '16px', padding: '20px', display: 'flex', alignItems: 'center', marginBottom: '16px', border: 'none', color: 'white', textAlign: 'left', cursor: 'pointer', boxShadow: '0 4px 12px rgba(0,0,0,0.1)' }}>
                  <span style={{ fontSize: '36px', marginRight: '20px', display: 'flex', alignItems: 'center', justifyContent: 'center', width: '48px', height: '48px', background: 'rgba(255,255,255,0.15)', borderRadius: '12px' }}>
                    {r.icon}
                  </span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: '20px', fontWeight: 800, marginBottom: '2px' }}>{r.title}</div>
                    <div style={{ fontSize: '13px', opacity: 0.9, lineHeight: '1.3' }}>{r.desc}</div>
                  </div>
                  <span style={{ fontSize: '24px', opacity: 0.8 }}>→</span>
                </button>
              ))}
            </div>
          </div>
        );
      }

      // VIEW 2: SUPABASE LOGIN FORM
      return (
        <div style={{ minHeight: '100vh', background: '#312e81', display: 'flex', flexDirection: 'column' }}>
          <div style={{ height: '40px' }}></div>
          <div style={{ background: '#ffffff', borderTopLeftRadius: '32px', borderTopRightRadius: '32px', flex: 1, padding: '32px 24px' }}>
            
            <button onClick={() => { setSelectedRole(null); setError(''); }} style={{ background: "transparent", border: "none", color: "#6366f1", fontWeight: 700, fontSize: "15px", cursor: "pointer", marginBottom: "24px", display: "flex", alignItems: "center", gap: "6px", padding: 0 }}>
              ← पीछे जाएँ
            </button>

            <div style={{ textAlign: 'center', marginBottom: '30px' }}>
              <div style={{ fontSize: '56px', marginBottom: '10px' }}>{selectedRole.icon}</div>
              <h1 style={{ fontSize: '24px', fontWeight: 800, color: '#1e293b', margin: 0 }}>{selectedRole.title} लॉगिन</h1>
              <p style={{ fontSize: '13px', color: '#64748b', marginTop: '6px' }}>अपने क्रेडेंशियल्स दर्ज करें</p>
            </div>

            <form onSubmit={handleLogin}>
              <Inp label="ईमेल आईडी" type="email" value={email} onChange={setEmail} />
              <div style={{ marginTop: '16px' }}><Inp label="पासवर्ड" type="password" value={password} onChange={setPassword} /></div>
              
              {error && <div style={{ color: '#dc2626', background: '#fee2e2', padding: '10px', borderRadius: '8px', marginTop: '16px', fontSize: '13px', fontWeight: 600 }}>{error}</div>}

    // ============================================================
    //  REPORT FORM (Clean Single Page Scrolling)
    // ============================================================
    function ReportForm({ user, reports, initialData, onSave, onCancel }) {

        b1_s4_total_received: "", b1_s4_hindi_reply: "", b1_s7_hindi_pages: "", b1_s7_total_pages: "", b1_s8_workshops: "", b1_s8_officers: ""

        const report = { ...data, section_name: user.section_name };

        }
        
        await onSave(report);
        setSubmitting(false);
      };

      return (
        <div style={{ maxWidth: 800, margin: "0 auto", paddingBottom: "40px" }}>
          
          <div style={{ background: "linear-gradient(135deg, #6366f1, #4f46e5)", color: "white", padding: "24px", borderRadius: "16px", marginBottom: "24px", textAlign: "center", boxShadow: "0 6px 20px rgba(99,102,241,0.3)" }}>
            <h2 style={{ fontSize: "28px", fontWeight: 800, margin: "0 0 6px 0" }}>🏢 {user.section_name}</h2>

          <div style={{ display: "flex", flexDirection: "column", gap: "20px" }}>

              <Grid><Num label="कुल जारी" value={data.b1_s3_total_issued} onChange={v => set("b1_s3_total_issued", v)} /><Num label="हिंदी में" value={data.b1_s3_hindi_only} onChange={v => set("b1_s3_hindi_only", v)} /></Grid>

              <h3 style={{ fontSize: 14, fontWeight: 800, color: "#334155", borderBottom: "2px solid #e2e8f0", paddingBottom: 6, margin: "20px 0 10px 0" }}>3. हिंदी कार्यशालाएं</h3>
              <Grid><Num label="कार्यशालाएं आयोजित" value={data.b1_s8_workshops} onChange={v => set("b1_s8_workshops", v)} /><Num label="प्रशिक्षित अधिकारी" value={data.b1_s8_officers} onChange={v => set("b1_s8_officers", v)} /></Grid>
            </SecCard>
          </div>

          <div style={{ marginTop: "24px", display: "flex", gap: "12px" }}>
            {initialData && <button onClick={onCancel} style={{ flex: 0.3, padding: "14px", borderRadius: "12px", border: "1px solid #cbd5e1", background: "#fff", fontWeight: 700, cursor: "pointer", fontSize: "15px" }}>रद्द करें</button>}
            
            <button onClick={handleSubmit} disabled={submitting} 
              style={{ flex: 1, padding: "14px", borderRadius: "12px", border: "none", background: "#10b981", color: "#fff", fontWeight: 800, fontSize: "16px", cursor: submitting ? "not-allowed" : "pointer", boxShadow: "0 4px 14px rgba(16,185,129,0.3)" }}>
              {submitting ? 'जमा हो रहा है...' : '✅ रिपोर्ट जमा करें'}
            </button>
          </div>
        </div>
      );
    }

    // ============================================================
    //  INBOX / DASHBOARD (Action Center)
    // ============================================================
    function ActionDashboard({ reports, user, onEdit, setView }) {
      const r = ROLES[user.role];
      const [selected, setSelected] = useState(null);
      const [remark, setRemark] = useState("");

      const myReports = reports.filter(rep => {
        if (user.role === 'DEO') return rep.section_name === user.section_name;
        if (user.role === 'AAO') return rep.section_name === user.section_name && ['PENDING_AAO', 'SAO_RETURNED', 'AAO_APPROVED'].includes(rep.status);
        if (user.role === 'SAO') return rep.section_name === user.section_name && ['PENDING_SAO', 'AAO_RETURNED', 'SAO_APPROVED'].includes(rep.status);
        if (user.role === 'HINDI_CELL') return ['SAO_APPROVED', 'SUBMITTED'].includes(rep.status);
        return true; // Admin sees all
      });

      const handleStatusChange = async (reportId, nextAction) => {
        const { error } = await supabase.from('reports').update({ 
          status: nextAction, 
          updated_at: new Date().toISOString()
        }).eq('id', reportId);

        if (error) alert("Error: " + error.message);
        else setSelected(null);
      };

      if (selected) {
        const st = STATUS[selected.status] || { label: selected.status, bg: "#eee", color: "#333", icon: "📌" };
        const actionBtns = workflowActionsFor(user.role, selected.status);

        return (
          <div style={{ maxWidth: 800, margin: "0 auto" }}>
            <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: "#6366f1", fontWeight: 700, cursor: "pointer", marginBottom: "16px", fontSize: "15px", display: 'flex', alignItems: 'center', gap: '5px', padding: 0 }}>← वापस सूची में</button>
            
            <div style={{ background: "#fff", borderRadius: "16px", padding: "24px", border: "1px solid #e2e8f0" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "20px", borderBottom: "1px solid #e2e8f0", paddingBottom: "16px" }}>
                <div>
                  <h2 style={{ fontSize: "22px", fontWeight: 800, color: "#1e293b", margin: "0 0 6px 0" }}>{selected.section_name}</h2>
                  <span style={{ fontSize: "14px", color: "#64748b", fontWeight: 600 }}>{selected.quarter} · {selected.year} · ID: {selected.ackId}</span>
                </div>
                <span style={{ background: st.bg, color: st.color, padding: "8px 14px", borderRadius: "8px", fontWeight: 700, fontSize: "13px", border: `1px solid ${st.color}40`, display: 'flex', alignItems: 'center', gap: '6px' }}>
                  {st.icon} {st.label}
                </span>
              </div>

              {actionBtns.length > 0 ? (
                <div style={{ background: "#f8fafc", padding: "20px", borderRadius: "12px", border: "1px solid #cbd5e1" }}>
                  <h3 style={{ fontSize: "15px", fontWeight: 800, color: "#1e293b", margin: "0 0 12px 0" }}>⚡ कार्रवाई करें</h3>
                  <textarea value={remark} onChange={e => setRemark(e.target.value)} placeholder="यहां कोई टिप्पणी लिखें (वैकल्पिक)..." style={{ width: "100%", padding: "12px", borderRadius: "8px", border: "1px solid #cbd5e1", marginBottom: "16px", outline: "none", fontFamily: "inherit", fontSize: "14px" }} rows={2} />
                  
                  <div style={{ display: "flex", gap: "12px" }}>
                    {actionBtns.map(btn => (
                      <button key={btn.action} onClick={() => handleStatusChange(selected.id, btn.action)}
                        style={{ flex: 1, padding: "14px", borderRadius: "10px", border: "none", background: btn.grad, color: "#fff", fontWeight: 800, cursor: "pointer", fontSize: "15px" }}>
                        {btn.label}
                      </button>
                    ))}
                  </div>
                </div>
              ) : (
                <div style={{ background: "#f1f5f9", padding: "16px", borderRadius: "10px", color: "#64748b", fontWeight: 600, textAlign: "center", fontSize: "14px" }}>
                  वर्तमान स्थिति में आपके लिए कोई कार्रवाई लंबित नहीं है।
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 800, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
            <h2 style={{ fontSize: "20px", fontWeight: 800, color: "#1e293b", margin: 0 }}>
              {user.role === 'DEO' ? '📋 मेरी फाइलें' : '📥 इनबॉक्स'}
            </h2>
            {user.role === 'DEO' && (
              <button onClick={() => setView('form')} style={{ background: "#6366f1", color: "#fff", border: "none", padding: "10px 18px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>+ नई रिपोर्ट</button>
            )}
          </div>

          {myReports.length === 0 ? (
            <div style={{ background: "#fff", padding: "40px", borderRadius: "16px", textAlign: "center", border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: "48px", marginBottom: "16px" }}>📭</div>
              <p style={{ color: "#64748b", fontWeight: 600, margin: 0, fontSize: "16px" }}>कोई रिपोर्ट नहीं मिली।</p>
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: "12px" }}>
              {myReports.map(rep => {
                const st = STATUS[rep.status] || { label: rep.status, bg: "#eee", color: "#333" };
                const needsAction = workflowActionsFor(user.role, rep.status).length > 0;

                return (
                  <div key={rep.id} onClick={() => setSelected(rep)} style={{ background: "#fff", padding: "16px 20px", borderRadius: "12px", border: "1px solid #e2e8f0", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", boxShadow: "0 2px 5px rgba(0,0,0,0.02)" }}>
                    <div>
                      <div style={{ fontSize: "16px", fontWeight: 800, color: "#1e293b" }}>{rep.section_name}</div>
                      <div style={{ fontSize: "13px", color: "#64748b", marginTop: "4px", fontWeight: 600 }}>{rep.quarter} · {rep.year}</div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                      {needsAction && <span style={{ background: "#ef4444", color: "#fff", padding: "4px 10px", borderRadius: "6px", fontSize: "11px", fontWeight: 800 }}>कार्रवाई आवश्यक</span>}
                      <span style={{ background: st.bg, color: st.color, padding: "6px 12px", borderRadius: "8px", fontSize: "13px", fontWeight: 700, border: `1px solid ${st.color}30` }}>
                        {st.label}
                      </span>
                    </div>
                  </div>
                )
              })}
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    //  MAIN APPLICATION ROUTER
    // ============================================================
    function App() {
      return <AuthProvider><MainApp /></AuthProvider>;
    }

    function MainApp() {
      const { user, profile, signOut, loading } = useAuth();
      if (loading) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div className="spinner"></div></div>;
      if (!user || !profile) return <LoginScreen />;
      return <AuthenticatedApp user={user} profile={profile} signOut={signOut} />;
    }

    function AuthenticatedApp({ user, profile, signOut }) {
      const { reports, loading } = useReports();
      const sections = useSections();
      
      const [view, setView] = useState(profile.role === 'DEO' ? 'form' : 'inbox');
      const [editingReport, setEditingReport] = useState(null);

      const handleSaveReport = async (reportData) => {
        if (reportData.id) await supabase.from('reports').update(reportData).eq('id', reportData.id);
        else await supabase.from('reports').insert([reportData]);
        setEditingReport(null);
        setView('inbox');
      };

      if (loading) return <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div className="spinner"></div></div>;

      const roleTheme = ROLES[profile.role] || { color: '#312e81', label: profile.role };

      return (
        <div>
          {/* Top Navigation Bar */}
          <nav style={{ background: roleTheme.color, padding: "14px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 4px 12px rgba(0,0,0,0.1)" }}>
            <div style={{ color: "white", fontWeight: 800, fontSize: "18px", display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span>🏛️</span> राजभाषा QPR
            </div>
            
            <div style={{ display: "flex", gap: "10px" }}>
              <button onClick={() => setView('inbox')} style={{ background: view === 'inbox' ? "rgba(255,255,255,0.2)" : "transparent", color: "white", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>📥 डैशबोर्ड</button>
              {profile.role === 'DEO' && (
                <button onClick={() => setView('form')} style={{ background: view === 'form' ? "rgba(255,255,255,0.2)" : "transparent", color: "white", border: "none", padding: "8px 16px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "14px" }}>📝 नई रिपोर्ट</button>
              )}
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
              <span style={{ color: "white", fontSize: "13px", fontWeight: 700, background: "rgba(0,0,0,0.2)", padding: "6px 14px", borderRadius: "20px" }}>{roleTheme.label}</span>
              <button onClick={signOut} style={{ background: "#ef4444", color: "white", border: "none", padding: "8px 14px", borderRadius: "8px", fontWeight: 700, cursor: "pointer", fontSize: "13px" }}>लॉगआउट</button>
            </div>
          </nav>

          {/* Main Content Area */}
          <main style={{ padding: "30px 20px 80px" }}>
            {view === 'form' && <ReportForm user={profile} reports={reports} initialData={editingReport} onSave={handleSaveReport} onCancel={() => setView('inbox')} />}
            {view === 'inbox' && <ActionDashboard reports={reports} user={profile} setView={setView} />}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
